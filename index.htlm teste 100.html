function getMsal() {
  if(msalInstance) return msalInstance;
  var msalLib = window.msal || window.Msal || window.PublicClientApplication;
  if(!msalLib) return null;
  if(msalLib.PublicClientApplication) {
    msalInstance = new msalLib.PublicClientApplication(msalConfig);
  } else if(typeof msalLib === "function") {
    msalInstance = new msalLib(msalConfig);
  }
  return msalInstance;
}
async function outlookLogin() {
  var m = getMsal(); if(!m) throw new Error("MSAL non chargé");
  try {
    var resp = await m.loginPopup({scopes:msalScopes});
    return resp.account;
  } catch(e) { console.error("Outlook login error",e); throw e; }
}
async function outlookGetToken() {
  var m = getMsal(); if(!m) throw new Error("MSAL non chargé");
  var accounts = m.getAllAccounts();
  if(accounts.length===0) { var acc = await outlookLogin(); accounts = [acc]; }
  try {
    var resp = await m.acquireTokenSilent({scopes:msalScopes, account:accounts[0]});
    return resp.accessToken;
  } catch(e) {
    var resp2 = await m.acquireTokenPopup({scopes:msalScopes, account:accounts[0]});
    return resp2.accessToken;
  }
}
async function outlookFetchMails(folder, top, skip) {
  var token = await outlookGetToken();
  folder = folder || "inbox";
  top = top || 25; skip = skip || 0;
  var url = "https://graph.microsoft.com/v1.0/me/mailFolders/"+folder+"/messages?$top="+top+"&$skip="+skip+"&$orderby=receivedDateTime desc&$select=id,subject,from,receivedDateTime,isRead,bodyPreview,hasAttachments,body";
  var resp = await fetch(url, {headers:{"Authorization":"Bearer "+token}});
  if(!resp.ok) throw new Error("Graph API error: "+resp.status);
  return resp.json();
}
async function outlookGetAttachments(msgId) {
  var token = await outlookGetToken();
  var resp = await fetch("https://graph.microsoft.com/v1.0/me/messages/"+msgId+"/attachments", {headers:{"Authorization":"Bearer "+token}});
  if(!resp.ok) throw new Error("Attachments error: "+resp.status);
  return resp.json();
}
async function outlookMarkRead(msgId) {
  var token = await outlookGetToken();
  await fetch("https://graph.microsoft.com/v1.0/me/messages/"+msgId, {method:"PATCH",headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},body:JSON.stringify({isRead:true})});
}
async function outlookSearchMails(query, top) {
  var token = await outlookGetToken();
  top = top || 25;
  var url = "https://graph.microsoft.com/v1.0/me/messages?$search=\""+encodeURIComponent(query)+"\"&$top="+top+"&$orderby=receivedDateTime desc&$select=id,subject,from,receivedDateTime,isRead,bodyPreview,hasAttachments,body";
  var resp = await fetch(url, {headers:{"Authorization":"Bearer "+token}});
  if(!resp.ok) throw new Error("Search error: "+resp.status);
  return resp.json();
}

// Helper: upload file to Firebase Storage, return {url, storagePath}
function uploadToStorage(storagePath, file) {
  return new Promise(function(resolve, reject) {
    var ref = storage.ref(storagePath);
    var task = ref.put(file);
    task.on("state_changed", null, function(err){reject(err)}, function() {
      task.snapshot.ref.getDownloadURL().then(function(url) {
        resolve({url:url, storagePath:storagePath});
      }).catch(reject);
    });
  });
}
// Helper: upload base64 dataURL to Storage
function uploadBase64ToStorage(storagePath, dataUrl) {
  return new Promise(function(resolve, reject) {
    var ref = storage.ref(storagePath);
    ref.putString(dataUrl, "data_url").then(function(snap) {
      snap.ref.getDownloadURL().then(function(url) {
        resolve({url:url, storagePath:storagePath});
      }).catch(reject);
    }).catch(reject);
  });
}
// Helper: delete from Storage
function deleteFromStorage(storagePath) {
  if(!storagePath) return Promise.resolve();
  return storage.ref(storagePath).delete().catch(function(e){console.error("Storage delete error:",e)});
}

      const u = snap.docs.map(d => ({id:d.id, ...d.data()}));
      if (u.length === 0) {
        DEFAULT_USERS.forEach(usr => db.collection("users").doc(usr.id).set(usr));
      } else {
        setUsersState(u);
      }
      setLoading(false);
    }, err => { console.error(err); setLoading(false); });
    return () => unsub();
  }, []);

  useEffect(() => { try{if(curUser)localStorage.setItem("psg_session",JSON.stringify(curUser));else localStorage.removeItem("psg_session")}catch(e){} }, [curUser]);

  useEffect(() => {
    if (curUser && users.length) {
      const fresh = users.find(u => u.id === curUser.id);
      if (fresh && JSON.stringify(fresh) !== JSON.stringify(curUser)) setCurUser(fresh);
    }
  }, [users]);

  const setUsers = (fn) => {
    const newUsers = typeof fn === "function" ? fn(users) : fn;
    newUsers.forEach(u => db.collection("users").doc(u.id).set(u));
    users.forEach(old => { if(!newUsers.find(n=>n.id===old.id)) db.collection("users").doc(old.id).delete(); });
  };

  const doLogin = () => {
    const lg = loginF.login.trim().toLowerCase();
    const pw = loginF.pwd.trim();
    const u = users.find(x => x.login.toLowerCase() === lg && x.pwd === pw && x.actif);
    if (u) { setCurUser(u); setLoginErr(""); }
    else setLoginErr("Identifiant ou mot de passe incorrect");
  };
  const doLogout = () => { setCurUser(null); };

  // Étape 1: envoyer code par email
  const sendResetCode = async () => {
    setResetMsg("");
    if(!resetF.login.trim()) return setResetMsg("Entrez votre identifiant");
    var u = users.find(function(x){return x.login.toLowerCase() === resetF.login.trim().toLowerCase()});
    if(!u) return setResetMsg("Identifiant introuvable");
    if(!u.email) return setResetMsg("Aucun email sur ce compte. Utilisez le code maître ci-dessous.");
    var code = String(Math.floor(100000 + Math.random()*900000));
    setResetCode(code);
    setResetUserId(u.id);
    setResetSending(true);
    try {
      await emailjs.send("service_zd2qmzh", "template_et7jwlo", {
        to_name: u.nom,
        to_email: u.email,
        code: code
      });
      setResetStep(2);
      setResetMsg("✅ Code envoyé à " + u.email.replace(/(.{2}).*(@.*)/, "$1***$2"));
    } catch(e) {
      setResetMsg("Erreur d'envoi: "+(e.text||e.message||"vérifiez EmailJS"));
    }
    setResetSending(false);
  };

  // Étape 2: valider code + nouveau mdp
  const doReset = () => {
    setResetMsg("");
    if(resetF.code !== resetCode && resetF.code !== MASTER_CODE) return setResetMsg("Code incorrect");
    if(!resetF.newPwd || resetF.newPwd.length < 3) return setResetMsg("Mot de passe trop court (min 3 car.)");
    if(resetF.newPwd !== resetF.newPwd2) return setResetMsg("Les mots de passe ne correspondent pas");
    var targetId = resetUserId;
    if(!targetId) {
      var u = users.find(function(x){return x.login.toLowerCase() === resetF.login.trim().toLowerCase()});
      if(!u) return setResetMsg("Identifiant introuvable");
      targetId = u.id;
    }
    db.collection("users").doc(targetId).update({pwd: resetF.newPwd});
    setResetMsg("✅ Mot de passe modifié ! Vous pouvez vous connecter.");
    setResetF({login:"",code:"",newPwd:"",newPwd2:""});
    setResetCode(null); setResetUserId(null);
    setTimeout(function(){setShowReset(false);setResetMsg("");setResetStep(1)},2000);
  };

  // Raccourci code maître (sans email)
  const useCodeMaitre = () => {
    setResetMsg("");
    if(!resetF.login.trim()) return setResetMsg("Entrez votre identifiant");
    var u = users.find(function(x){return x.login.toLowerCase() === resetF.login.trim().toLowerCase()});
    if(!u) return setResetMsg("Identifiant introuvable");
    setResetUserId(u.id);
    setResetStep(2);
    setResetMsg("Entrez le code maître + nouveau mot de passe");
  };

  /* === LOADING === */
  if (loading) return (
    <div style={{background:"#0F172A",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14}}>
      <div style={{width:50,height:50,border:"4px solid #334155",borderTop:"4px solid #F59E0B",borderRadius:"50%",animation:"sp 1s linear infinite"}}/>
      <div style={{color:"#94A3B8",fontSize:13}}>Connexion à la base de données…</div>
    </div>
  );

  /* === LOGIN === */
  if (!curUser) return (
    <div style={{background:"#0F172A",color:"#E2E8F0",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#1E293B",borderRadius:16,padding:"36px",width:"100%",maxWidth:380,border:"1px solid #334155",animation:"fi .4s"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <img src={LOGO} alt="Point S" style={{height:50,marginBottom:10}} />
          <h1 style={{fontSize:20,fontWeight:700}}>Point S Guignes</h1>
          <p style={{fontSize:11,color:"#94A3B8",marginTop:3}}>Gestion Sinistres</p>
          <div style={{marginTop:6,display:"inline-flex",alignItems:"center",gap:5,background:"rgba(16,185,129,0.08)",padding:"3px 10px",borderRadius:12,border:"1px solid rgba(16,185,129,0.2)"}}><div style={{width:6,height:6,borderRadius:3,background:"#10B981"}}/>
            <span style={{fontSize:9,color:"#10B981",fontWeight:600}}>En ligne — Base partagée</span>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <label style={S.l}>Identifiant</label>
          <input style={S.i} value={loginF.login} onChange={e => setLoginF({...loginF, login:e.target.value})} placeholder="admin" onKeyDown={e => e.key==="Enter" && doLogin()} />
        </div>
        <div style={{marginBottom:18}}>
          <label style={S.l}>Mot de passe</label>
          <input type="password" style={S.i} value={loginF.pwd} onChange={e => setLoginF({...loginF, pwd:e.target.value})} placeholder="admin" onKeyDown={e => e.key==="Enter" && doLogin()} />
        </div>
        {loginErr && <div style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:7,padding:"9px 12px",color:"#FCA5A5",fontSize:11,marginBottom:14,textAlign:"center"}}>{loginErr}</div>}
        <button onClick={doLogin} style={{...S.b,width:"100%",padding:"11px"}}>Se connecter</button>
        <div style={{textAlign:"center",marginTop:12}}>
          <span onClick={function(){setShowReset(!showReset);setResetMsg("");setResetStep(1);setResetF({login:"",code:"",newPwd:"",newPwd2:""})}} style={{fontSize:10,color:"#F59E0B",cursor:"pointer",textDecoration:"underline"}}>🔑 Mot de passe oublié ?</span>
        </div>
        {showReset && <div style={{marginTop:14,background:"#0F172A",borderRadius:10,padding:"16px",border:"1px solid #334155",animation:"fi .2s"}}>
          <h4 style={{fontSize:12,fontWeight:600,marginBottom:10,color:"#F59E0B"}}>Réinitialiser le mot de passe</h4>
          {resetStep===1 && <div>
            <div style={{marginBottom:8}}><label style={S.l}>Identifiant</label><input style={S.i} value={resetF.login} onChange={function(e){setResetF({...resetF,login:e.target.value})}} placeholder="Votre login" /></div>
            {resetMsg && <div style={{background:resetMsg.includes("✅")?"rgba(16,185,129,0.08)":"rgba(239,68,68,0.08)",border:"1px solid "+(resetMsg.includes("✅")?"rgba(16,185,129,0.2)":"rgba(239,68,68,0.2)"),borderRadius:7,padding:"8px 12px",color:resetMsg.includes("✅")?"#10B981":"#FCA5A5",fontSize:11,marginBottom:10,textAlign:"center"}}>{resetMsg}</div>}
            <button onClick={sendResetCode} disabled={resetSending} style={{...S.b,width:"100%",padding:"10px",background:"linear-gradient(135deg,#F59E0B,#D97706)",color:"#0F172A"}}>{resetSending?"Envoi en cours…":"📧 Recevoir un code par email"}</button>
            <div style={{textAlign:"center",marginTop:8}}>
              <span onClick={useCodeMaitre} style={{fontSize:9,color:"#94A3B8",cursor:"pointer",textDecoration:"underline"}}>Pas d'email ? Utiliser le code maître</span>
            </div>
          </div>}
          {resetStep===2 && <div>
            <div style={{marginBottom:8}}><label style={S.l}>Identifiant</label><input style={S.i} value={resetF.login} disabled={true} /></div>
            <div style={{marginBottom:8}}><label style={S.l}>Code reçu par email (ou code maître)</label><input style={S.i} value={resetF.code} onChange={function(e){setResetF({...resetF,code:e.target.value})}} placeholder="6 chiffres ou code maître" autoFocus /></div>
            <div style={{marginBottom:8}}><label style={S.l}>Nouveau mot de passe</label><input type="password" style={S.i} value={resetF.newPwd} onChange={function(e){setResetF({...resetF,newPwd:e.target.value})}} placeholder="Nouveau mot de passe" /></div>
            <div style={{marginBottom:10}}><label style={S.l}>Confirmer</label><input type="password" style={S.i} value={resetF.newPwd2} onChange={function(e){setResetF({...resetF,newPwd2:e.target.value})}} placeholder="Retapez le mot de passe" onKeyDown={function(e){if(e.key==="Enter")doReset()}} /></div>
            {resetMsg && <div style={{background:resetMsg.includes("✅")?"rgba(16,185,129,0.08)":"rgba(239,68,68,0.08)",border:"1px solid "+(resetMsg.includes("✅")?"rgba(16,185,129,0.2)":"rgba(239,68,68,0.2)"),borderRadius:7,padding:"8px 12px",color:resetMsg.includes("✅")?"#10B981":"#FCA5A5",fontSize:11,marginBottom:10,textAlign:"center"}}>{resetMsg}</div>}
            <button onClick={doReset} style={{...S.b,width:"100%",padding:"10px",background:"linear-gradient(135deg,#F59E0B,#D97706)",color:"#0F172A"}}>Réinitialiser</button>
            <div style={{textAlign:"center",marginTop:6}}><span onClick={function(){setResetStep(1);setResetMsg("")}} style={{fontSize:9,color:"#94A3B8",cursor:"pointer",textDecoration:"underline"}}>← Retour</span></div>
          </div>}
        </div>}
        <p style={{fontSize:9,color:"#475569",textAlign:"center",marginTop:14}}>Premier accès: <strong style={{color:"#94A3B8"}}>admin</strong> / <strong style={{color:"#94A3B8"}}>admin</strong></p>
      </div>
    </div>
  );

  return <MainApp curUser={curUser} users={users} setUsers={setUsers} doLogout={doLogout} />;
}

/* ========================================= */
/* === MAIN APP === */
/* ========================================= */
function MainApp({curUser, users, setUsers, doLogout}) {
  const [pg, sP] = useState("dash");
  const [dosState, setDosState] = useState([]);
  const [loading, setLoading] = useState(true);
  const [chk, sC] = useState(() => { try{const r=localStorage.getItem("psg_chk_"+new Date().toISOString().slice(0,10));return r?JSON.parse(r):{}}catch(e){return{}} });
  const [dd, sDd] = useState(null);
  const [dt, sDt] = useState("infos");
  const [sf, sSf] = useState(null);
  const [sm, sSm] = useState(null);
  const [cp, sCp] = useState(false);
  const [fi, sFi] = useState("all");
  const [sr, sSr] = useState("");

  // === OUTLOOK FLOATING MAIL VIEWER ===
  const [olFloatMail, setOlFloatMail] = useState(null);
  const [olFloatAtt, setOlFloatAtt] = useState([]);
  const [olFloatMin, setOlFloatMin] = useState(false);
  const [olNotif, setOlNotif] = useState(null);
  const [olLastCheck, setOlLastCheck] = useState(null);

  // Poll Outlook for new mails every 60s
  useEffect(function(){
    var interval = setInterval(async function(){
      try {
        var m = getMsal(); if(!m) return;
        var accounts = m.getAllAccounts(); if(accounts.length===0) return;
        var token;
        try { var resp = await m.acquireTokenSilent({scopes:msalScopes, account:accounts[0]}); token=resp.accessToken; } catch(e){ return; }
        var url = "https://graph.microsoft.com/v1.0/me/mailFolders/inbox/messages?$top=1&$orderby=receivedDateTime desc&$select=id,subject,from,receivedDateTime,isRead,bodyPreview&$filter=isRead eq false";
        var resp2 = await fetch(url, {headers:{"Authorization":"Bearer "+token}});
        if(!resp2.ok) return;
        var data = await resp2.json();
        if(data.value && data.value.length > 0) {
          var latest = data.value[0];
          if(!olLastCheck || latest.receivedDateTime > olLastCheck) {
            setOlLastCheck(latest.receivedDateTime);
            var fromName = latest.from && latest.from.emailAddress ? latest.from.emailAddress.name : "Inconnu";
            setOlNotif({id:latest.id, from:fromName, subject:latest.subject||"(sans objet)", time:new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})});
            // Auto-dismiss after 8s
            setTimeout(function(){setOlNotif(function(n){return n && n.id===latest.id ? null : n})}, 8000);
            // Play sound
            try { var audio = new Audio("data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbsGczHjqIwOPjnF03Knitv9Lqy5BCLC1Uqa2/5tKqZT4sRpOqtdrjvZFfOjFcoKq3"); audio.volume=0.3; audio.play().catch(function(){}); } catch(e){}
          }
        }
      } catch(e){}
    }, 60000);
    return function(){clearInterval(interval)};
  }, [olLastCheck]);

  // Messages motivants via bot
  const MOTIV_MSGS = [
    "Bonjour {nom} ! Bien dormi ? Allez c'est parti ! 💪",
    "Salut {nom} ! Encore un effort, on lâche rien ! 🔥",
    "{nom}, reste concentré(e) aujourd'hui, tu gères ! 👊",
    "Force {nom} ! Ne faiblis pas, la journée est à toi ! ⚡",
    "Hey {nom} ! On donne tout aujourd'hui ! 💯",
    "Courage {nom} ! Chaque dossier rapproche du succès ! 🚀",
    "{nom}, aujourd'hui on fait du bon boulot ! 🏆",
    "Bienvenue {nom} ! Un café et c'est reparti ! ☕",
    "Allez {nom}, montre ce que tu sais faire ! 🎯",
    "{nom}, la team compte sur toi, en route ! 🤝"
  ];
  const [showMotiv, setShowMotiv] = useState(false);
  // Envoie un message bot au premier login du jour
  useEffect(function(){
    try {
      var k = "psg_botmotiv_"+new Date().toISOString().slice(0,10)+"_"+curUser.id;
      if(sessionStorage.getItem(k)) return;
      sessionStorage.setItem(k,"1");
      var prenom = curUser.nom.split(" ")[0];
      // Message perso du patron OU message aléatoire
      if(curUser.message) {
        botMsg("general", "💬 Message pour "+prenom+" : "+curUser.message);
      } else {
        var msg = MOTIV_MSGS[Math.floor(Math.random()*MOTIV_MSGS.length)].replace("{nom}", prenom);
        botMsg("general", msg);
      }
      // Afficher bandeau si message du patron
      if(curUser.message) setShowMotiv(true);
    } catch(e){}
  }, []);

  // Suivi temps de travail (heartbeat toutes les 60s si page visible)
  const [inboxUnread, setInboxUnread] = useState(0);
  const [todoPending, setTodoPending] = useState(0);
  useEffect(function(){
    var unsub = db.collection("inbox")
      .where("toId","==",curUser.id)
      .onSnapshot(function(snap){ 
        var count = 0;
        snap.docs.forEach(function(d){if(!d.data().read) count++});
        setInboxUnread(count); 
      });
    return function(){unsub()};
  }, [curUser.id]);
  useEffect(function(){
    var unsub = db.collection("todos")
      .where("userId","==",curUser.id)
      .onSnapshot(function(snap){ 
        var count = 0;
        snap.docs.forEach(function(d){if(!d.data().done) count++});
        setTodoPending(count); 
      });
    return function(){unsub()};
  }, [curUser.id]);
  useEffect(function(){
    var today = new Date().toISOString().slice(0,10);
    var docRef = db.collection("timetrack").doc(today+"_"+curUser.id);
    var active = true;
    // Marquer connexion
    docRef.set({
      userId: curUser.id,
      userName: curUser.nom,
      userRole: curUser.role,
      date: today,
      minutes: firebase.firestore.FieldValue.increment(0),
      lastSeen: new Date().toISOString(),
      loginAt: firebase.firestore.FieldValue.arrayUnion(new Date().toISOString())
    }, {merge:true});
    // Visibilité page
    var onVis = function(){active = document.visibilityState==="visible"};
    document.addEventListener("visibilitychange", onVis);
    // Heartbeat: +1 minute si actif
    var iv = setInterval(function(){
      if(!active) return;
      var d = new Date().toISOString().slice(0,10);
      var ref = db.collection("timetrack").doc(d+"_"+curUser.id);
      ref.set({
        userId: curUser.id, userName: curUser.nom, userRole: curUser.role, date: d,
        minutes: firebase.firestore.FieldValue.increment(1),
        lastSeen: new Date().toISOString()
      }, {merge:true});
    }, 60000);
    return function(){clearInterval(iv);document.removeEventListener("visibilitychange",onVis)};
  }, [curUser.id]);

  /* === FIREBASE: charger dossiers en temps réel === */
  const [migrated, setMigrated] = useState(false);
  useEffect(() => {
    const unsub = db.collection("dossiers").onSnapshot(snap => {
      const d = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
      d.sort((a,b) => (b.creeAt||"").localeCompare(a.creeAt||""));
      setDosState(d);
      setLoading(false);
      // Migration pv/pa: une seule fois
      if(!migrated) {
        setMigrated(true);
        d.forEach(function(dos) {
          var pcs = dos.pcs || [];
          var needFix = pcs.some(function(p){return p.pv===undefined||p.pv===null||p.pa===undefined||p.pa===null});
          if(needFix) {
            var fixed = pcs.map(function(p){
              var out = {...p};
              if(out.pv===undefined||out.pv===null) out.pv = out.p || 0;
              if(out.pa===undefined||out.pa===null) out.pa = out.p || 0;
              return out;
            });
            var chiff = fixed.reduce(function(a,p){return a+(p.q||0)*(p.pv||0)},0);
            db.collection("dossiers").doc(dos.id).update({pcs:fixed, mt:String(Math.round(chiff*100)/100)});
          }
        });
      }
    }, err => { console.error("Firestore error:", err); setLoading(false); });
    return () => unsub();
  }, []);

  // Sync selected dossier
  useEffect(() => {
    if (dd) {
      const fresh = dosState.find(x => x.id === dd.id);
      if (fresh) sDd(fresh);
    }
  }, [dosState]);

  useEffect(() => { try{localStorage.setItem("psg_chk_"+new Date().toISOString().slice(0,10),JSON.stringify(chk))}catch(e){} }, [chk]);

  const dos = loading ? [] : [...dosState];

  /* === FIREBASE: opérations dossiers === */
  const addDos = (v) => {
    const newDoc = {...v, id:uid(), ph:[0,0,0,0], pcs:[], creePar:curUser.nom, creeAt:new Date().toISOString()};
    db.collection("dossiers").doc(newDoc.id).set(newDoc);
    botMsg("general", "📁 Nouveau dossier créé par "+curUser.nom+" : "+(v.cli||"")+" — "+(v.imm||"")+(v.veh?" ("+v.veh+")":""));
  };
  const updDos = (id, u) => {
    // Si passage en "facture", stocker la date
    if(u.sta === "facture") u.dateFacture = new Date().toISOString();
    // Si on change de statut depuis facture/relance, nettoyer
    if(u.sta && u.sta !== "facture" && u.sta !== "relance") u.dateFacture = null;
    db.collection("dossiers").doc(id).update(u);
    // Bot notif: changements de statut
    if(u.sta) {
      var d = dos.find(function(x){return x.id===id});
      var nom = d ? (d.cli||"")+" — "+(d.imm||"") : id;
      var labels = {attente:"⏳ En attente",expertise:"🔍 Expertise",reparation:"🔧 En réparation",facture:"💰 Facturé",relance:"⚠️ Relance",termine:"✅ Terminé"};
      var label = labels[u.sta] || u.sta;
      botMsg("general", label+" → "+nom+" (par "+curUser.nom+")");
    }
  };

  // Auto-relance: vérifier toutes les 60s si un dossier facturé > 10 jours
  useEffect(function() {
    var checkRelance = function() {
      var now = new Date();
      dos.forEach(function(d) {
        if(d.sta === "facture" && d.dateFacture) {
          var diff = (now - new Date(d.dateFacture)) / (1000*60*60*24);
          if(diff >= 10) {
            db.collection("dossiers").doc(d.id).update({sta:"relance"});
            botMsg("urgent", "⚠️ Relance automatique : "+(d.cli||"")+" — "+(d.imm||"")+" (facturé depuis "+Math.round(diff)+" jours)");
          }
        }
      });
    };
    checkRelance();
    var interval = setInterval(checkRelance, 60000);
    return function(){clearInterval(interval)};
  }, [dos]);
  const delDos = (id) => {
    var d = dos.find(function(x){return x.id===id});
    db.collection("dossiers").doc(id).delete();
    if(d) botMsg("general", "🗑 Dossier supprimé : "+(d.cli||"")+" — "+(d.imm||"")+" (par "+curUser.nom+")");
  };

  const cd = Object.values(chk).filter(Boolean).length;
  const fD = dos.filter(d => (fi==="all"||d.sta===fi) && (!sr||[d.cli,d.imm,d.num,d.ass].some(x=>(x||"").toLowerCase().includes(sr.toLowerCase()))));
  const rl = ROLES.find(r=>r.id===curUser.role) || ROLES[0];

  /* === LOADING DOSSIERS === */
  if (loading) return (
    <div style={{background:"#0F172A",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
      <div style={{width:30,height:30,border:"3px solid #334155",borderTop:"3px solid #F59E0B",borderRadius:"50%",animation:"sp 1s linear infinite"}}/>
      <span style={{color:"#94A3B8",fontSize:12}}>Chargement des dossiers…</span>
    </div>
  );

  return (
  <div style={{display:"flex",height:"100vh"}}>

  {/* SIDEBAR */}
  <div style={{width:210,background:"#1E293B",borderRight:"1px solid #334155",display:"flex",flexDirection:"column",flexShrink:0}}>
    <div style={{padding:"16px 14px",borderBottom:"1px solid #334155",display:"flex",alignItems:"center",gap:9}}>
      <img src={LOGO} alt="Point S" style={{height:28,flexShrink:0}} />
      <div><div style={{fontSize:12,fontWeight:700,color:"#F8FAFC"}}>Point S Guignes</div><div style={{fontSize:9,color:"#94A3B8"}}>Gestion Sinistres</div></div>

}

function MailsTab({d, contacts}) {
  const [tpls, setTpls] = useState([]);

  const [showContacts, setShowContacts] = useState(false);
  const [newCt, setNewCt] = useState({nom:"",type:"expert",email:"",tel:""});
  const [editId, setEditId] = useState(null);
  const [editF, setEditF] = useState({ic:"",titre:"",objet:"",corps:""});
  const [showNew, setShowNew] = useState(false);
  const [newF, setNewF] = useState({ic:"✉️",titre:"",objet:"",corps:"Bonjour,\n\n\n\nCordialement,\nPoint S Guignes\n07.75.78.43.34"});

  // Charger templates depuis Firebase
  useEffect(function() {
    var unsub = db.collection("mailTemplates").onSnapshot(function(snap) {
      var t = snap.docs.map(function(doc){return {id:doc.id, ...doc.data()}});
      t.sort(function(a,b){return (a.ordre||0)-(b.ordre||0)});
      if (t.length === 0 && !tplLoaded) {
        // Premier lancement: créer les templates par défaut
        DEFAULT_TPLS.forEach(function(tpl, i) {
          db.collection("mailTemplates").doc(tpl.id).set({...tpl, ordre:i});
        });
      } else {
        setTpls(t);
      }
      setTplLoaded(true);
    }, function(err){console.error(err); setTplLoaded(true);});
    return function(){unsub()};
  }, []);

  // Remplacer variables par données dossier
  var replacer = function(txt) {
    return (txt||"").replace(/\{CLIENT\}/g, d.cli||"___").replace(/\{IMMAT\}/g, d.imm||"___").replace(/\{VEHICULE\}/g, d.veh||"___").replace(/\{NUM\}/g, d.num||"___").replace(/\{MONTANT\}/g, d.mt||"___").replace(/\{FRANCHISE\}/g, d.fr||"___").replace(/\{LIVRAISON\}/g, d.liv?fd(d.liv):"___").replace(/\{TEL\}/g, d.tel||"___").replace(/\{EMAIL\}/g, d.email||"___").replace(/\{ASSUREUR\}/g, d.ass||"___").replace(/\{EXPERT\}/g, d.exp||"___");
  };

  const addContact = function() {
    if(!newCt.nom||!newCt.email) return alert("Nom et email requis");
    var c = {...newCt, id:uid()};
    db.collection("contacts").doc(c.id).set(c);
    setNewCt({nom:"",type:"expert",email:"",tel:""});
  };
  const delContact = function(id) { if(confirm("Supprimer?")) db.collection("contacts").doc(id).delete(); };

  const expContact = contacts.find(function(c){return c.type==="expert" && d.exp && d.exp.toLowerCase().includes(c.nom.toLowerCase())});
  const assContact = contacts.find(function(c){return c.type==="assureur" && d.ass && d.ass.toLowerCase().includes(c.nom.toLowerCase())});

  const openOutlook = function(to, subject, body) {

    window.open(url, "_blank");
  };

  // Sauvegarder modification template
  var saveEdit = function() {
    if(!editF.titre) return;
    db.collection("mailTemplates").doc(editId).update(editF);
    setEditId(null);
  };
  // Ajouter nouveau template
  var addTpl = function() {
    if(!newF.titre) return alert("Titre requis");

    db.collection("mailTemplates").doc(id).set({...newF, id:id, ordre:tpls.length});
    setNewF({ic:"✉️",titre:"",objet:"",corps:"Bonjour,\n\n\n\nCordialement,\nPoint S Guignes\n07.75.78.43.34"});
    setShowNew(false);

          <div style={{marginBottom:8}}><label style={S.l}>Corps</label><textarea rows={5} style={{...S.i,resize:"vertical"}} value={editF.corps} onChange={function(e){setEditF({...editF,corps:e.target.value})}} /></div>
          <div style={{display:"flex",gap:5,justifyContent:"flex-end"}}><button onClick={function(){setEditId(null)}} style={S.bg}>Annuler</button><button onClick={saveEdit} style={S.b}>✓ Enregistrer</button></div>
        </div>;

        return <div key={tpl.id} style={{...S.c,padding:"16px",display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>

              <span onClick={function(){delTpl(tpl.id)}} style={{cursor:"pointer",fontSize:12}}>🗑</span>

            {expContact && <button onClick={function(){openOutlook(expContact.email,obj,body)}} style={{width:"100%",padding:"7px",background:"linear-gradient(135deg,#F59E0B,#D97706)",color:"#0F172A",border:"none",borderRadius:6,fontWeight:600,fontSize:10,cursor:"pointer"}}>🔍 Expert ({expContact.nom})</button>}
            {assContact && <button onClick={function(){openOutlook(assContact.email,obj,body)}} style={{width:"100%",padding:"7px",background:"linear-gradient(135deg,#3B82F6,#2563EB)",color:"#FFF",border:"none",borderRadius:6,fontWeight:600,fontSize:10,cursor:"pointer"}}>🏢 Assureur ({assContact.nom})</button>}
            {!d.email && !expContact && !assContact && <button onClick={function(){openOutlook("",obj,body)}} style={{width:"100%",padding:"7px",background:"linear-gradient(135deg,#0078D4,#106EBE)",color:"#FFF",border:"none",borderRadius:6,fontWeight:600,fontSize:10,cursor:"pointer"}}>✉️ Outlook</button>}
            <button onClick={function(){navigator.clipboard.writeText("Objet: "+obj+"\n\n"+body)}} style={{width:"100%",padding:"7px",background:"#0F172A",color:"#94A3B8",border:"1px solid #475569",borderRadius:6,fontSize:10,cursor:"pointer"}}>📋 Copier</button>
          </div>
        </div>;
      })}
    </div>
  </div>;
}

/* === PHOTOS TAB === */
function PhotosTab({d, up}) {
  const CATS = [["non_classee","📥 Non classées","#94A3B8"],["avant","🔴 Avant","#EF4444"],["expertise","🔍 Expertise","#F59E0B"],["pendant","🔵 Pendant","#3B82F6"],["apres","🟢 Après","#10B981"]];
  const [photos, setPhotos] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [uploadProg, setUploadProg] = useState(0);
  const [viewer, setViewer] = useState(null);
  const [movePh, setMovePh] = useState(null);
  const fileRef = useRef(null);
  const camRef = useRef(null);

  // Charger photos depuis Firestore
  useEffect(function() {
    var unsub = db.collection("dossiers").doc(d.id).collection("photos").onSnapshot(function(snap) {
      setPhotos(snap.docs.map(function(doc){return {id:doc.id,...doc.data()}}).sort(function(a,b){return (a.date||"").localeCompare(b.date||"")}));
    }, function(err){console.error(err)});
    return function(){unsub()};
  }, [d.id]);

  // Upload photo
  var doUpload = function(files) {
    if (!files || !files.length) return;
    setUploading(true);
    var total = files.length;
    var done = 0;
    Array.from(files).forEach(function(file) {
      if (!file.type.startsWith("image/")) { done++; return; }
      var id = uid();
      var path = "dossiers/"+d.id+"/photos/"+id+"_"+file.name;
      var ref = storage.ref(path);
      var task = ref.put(file);
      task.on("state_changed", function(snap) {
        setUploadProg(Math.round((snap.bytesTransferred/snap.totalBytes)*100));
      }, function(err) {
        console.error(err);
        done++;
        if(done>=total) setUploading(false);
      }, function() {
        task.snapshot.ref.getDownloadURL().then(function(url) {
          db.collection("dossiers").doc(d.id).collection("photos").doc(id).set({
            id:id, url:url, path:path, name:file.name, cat:"non_classee",
            date:new Date().toISOString(), size:file.size
          });
          done++;
          if(done>=total){ setUploading(false); setUploadProg(0); }
        });
      });
    });
  };

  // Changer catégorie
  var setCat = function(photoId, cat) {
    db.collection("dossiers").doc(d.id).collection("photos").doc(photoId).update({cat:cat});
    setMovePh(null);
  };

  // Supprimer photo
  var delPhoto = function(ph) {
    if(!confirm("Supprimer cette photo?")) return;
    storage.ref(ph.path).delete().catch(function(e){console.error(e)});
    db.collection("dossiers").doc(d.id).collection("photos").doc(ph.id).delete();
    if(viewer && viewer.id===ph.id) setViewer(null);
  };

  var countCat = function(cat) { return photos.filter(function(p){return p.cat===cat}).length; };

  return <div>
    {/* ZONE UPLOAD */}
    <div onDragOver={function(e){e.preventDefault();e.currentTarget.style.borderColor="#F59E0B"}} onDragLeave={function(e){e.currentTarget.style.borderColor="#475569"}} onDrop={function(e){e.preventDefault();e.currentTarget.style.borderColor="#475569";doUpload(e.dataTransfer.files)}} style={{border:"2px dashed #475569",borderRadius:12,padding:"25px 20px",textAlign:"center",background:"rgba(15,23,42,0.4)",marginBottom:16,transition:"border-color .2s"}}>
      {uploading ? <div>
        <div style={{width:40,height:40,border:"3px solid #334155",borderTop:"3px solid #F59E0B",borderRadius:"50%",margin:"0 auto 10px",animation:"sp 1s linear infinite"}} />
        <div style={{fontWeight:600,color:"#F59E0B"}}>Upload {uploadProg}%</div>
        <div style={{background:"#334155",borderRadius:4,height:6,marginTop:8,maxWidth:200,margin:"8px auto 0"}}><div style={{background:"#F59E0B",borderRadius:4,height:6,width:uploadProg+"%",transition:"width .3s"}}/></div>
      </div>
      : <div>
        <div style={{fontSize:40,marginBottom:8}}>📷</div>
        <div style={{fontWeight:600,marginBottom:8}}>Glissez vos photos ici</div>
        <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
          <input ref={fileRef} type="file" accept="image/*" multiple onChange={function(e){doUpload(e.target.files)}} style={{display:"none"}} />
          <input ref={camRef} type="file" accept="image/*" capture="environment" onChange={function(e){doUpload(e.target.files)}} style={{display:"none"}} />
          <button onClick={function(){camRef.current&&camRef.current.click()}} style={{padding:"9px 18px",background:"linear-gradient(135deg,#F59E0B,#D97706)",color:"#0F172A",border:"none",borderRadius:8,fontWeight:700,fontSize:12,cursor:"pointer"}}>📸 Prendre une photo</button>
          <button onClick={function(){fileRef.current&&fileRef.current.click()}} style={{padding:"9px 18px",background:"linear-gradient(135deg,#3B82F6,#2563EB)",color:"#FFF",border:"none",borderRadius:8,fontWeight:700,fontSize:12,cursor:"pointer"}}>🖼 Galerie</button>
        </div>
        <div style={{fontSize:10,color:"#64748B",marginTop:6}}>JPG, PNG — Plusieurs photos à la fois</div>
      </div>}
    </div>

    {/* COMPTEURS */}
    <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
      {CATS.map(function(c) {
        var n = countCat(c[0]);
        return <div key={c[0]} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:6,background:n?c[2]+"15":"#0F172A",border:"1px solid "+(n?c[2]+"30":"#334155")}}>
          <span style={{fontSize:10}}>{c[1].split(" ")[0]}</span>
          <span style={{fontSize:11,fontWeight:700,color:n?c[2]:"#475569"}}>{n}</span>
        </div>;
      })}
      <div style={{marginLeft:"auto",fontSize:11,color:"#94A3B8",alignSelf:"center"}}>{photos.length} photo{photos.length>1?"s":""}</div>
    </div>

    {/* PHOTOS PAR CATÉGORIE */}
    {CATS.map(function(cat) {
      var catPhotos = photos.filter(function(p){return p.cat===cat[0]});
      if(!catPhotos.length) return null;
      return <div key={cat[0]} style={{marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <div style={{width:4,height:20,borderRadius:2,background:cat[2]}}/>
          <h4 style={{fontSize:13,fontWeight:600}}>{cat[1]}</h4>
          <span style={{fontSize:10,color:"#64748B"}}>({catPhotos.length})</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8}}>
          {catPhotos.map(function(ph) {
            return <div key={ph.id} style={{position:"relative",borderRadius:8,overflow:"hidden",background:"#0F172A",border:"1px solid #334155",aspectRatio:"1"}}>
              <img src={ph.url} alt="" onClick={function(){setViewer(ph)}} style={{width:"100%",height:"100%",objectFit:"cover",cursor:"pointer",display:"block"}} />
              <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,.8))",padding:"20px 6px 6px",display:"flex",justifyContent:"space-between"}}>
                <span onClick={function(){setMovePh(ph)}} style={{cursor:"pointer",fontSize:12,background:"rgba(255,255,255,.15)",borderRadius:4,padding:"2px 6px"}}>📂</span>
                <span onClick={function(){delPhoto(ph)}} style={{cursor:"pointer",fontSize:12,background:"rgba(239,68,68,.2)",borderRadius:4,padding:"2px 6px"}}>🗑</span>
              </div>
            </div>;
          })}
        </div>
      </div>;
    })}

    {!photos.length && <div style={{...S.c,padding:"30px",textAlign:"center"}}><div style={{fontSize:40,marginBottom:8}}>📷</div><div style={{fontWeight:600,color:"#94A3B8"}}>Aucune photo</div><p style={{fontSize:11,color:"#64748B"}}>Prenez une photo ou glissez des fichiers ci-dessus</p></div>}

    {/* MODAL DÉPLACER */}
    {movePh && <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:12}} onClick={function(){setMovePh(null)}}>
      <div onClick={function(e){e.stopPropagation()}} style={{background:"#1E293B",borderRadius:13,padding:"22px",width:"100%",maxWidth:360,border:"1px solid #334155",animation:"fi .2s"}}>
        <h3 style={{fontSize:14,fontWeight:700,marginBottom:4}}>📂 Classer cette photo</h3>
        <p style={{fontSize:10,color:"#94A3B8",marginBottom:14}}>{movePh.name}</p>
        <div style={{display:"grid",gap:6}}>
          {CATS.map(function(cat) {
            var isCurrent = movePh.cat === cat[0];
            return <button key={cat[0]} onClick={function(){if(!isCurrent)setCat(movePh.id,cat[0])}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:isCurrent?cat[2]+"20":"#0F172A",border:isCurrent?"2px solid "+cat[2]:"1px solid #334155",borderRadius:8,color:isCurrent?cat[2]:"#94A3B8",fontWeight:isCurrent?700:400,fontSize:12,cursor:isCurrent?"default":"pointer",textAlign:"left"}}>
              <div style={{width:12,height:12,borderRadius:3,background:cat[2]}} />
              {cat[1]}
              {isCurrent && <span style={{marginLeft:"auto",fontSize:9}}>✓ Actuel</span>}
            </button>;
          })}
        </div>
      </div>
    </div>}

    {/* VISIONNEUSE PLEIN ÉCRAN */}
    {viewer && <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.95)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:1001,padding:12}} onClick={function(){setViewer(null)}}>
      <div style={{position:"absolute",top:12,right:12,display:"flex",gap:8}}>
        <button onClick={function(e){e.stopPropagation();setMovePh(viewer);setViewer(null)}} style={{padding:"8px 14px",background:"rgba(255,255,255,.1)",border:"none",borderRadius:8,color:"#FFF",fontSize:11,cursor:"pointer"}}>📂 Classer</button>
        <button onClick={function(e){e.stopPropagation();delPhoto(viewer)}} style={{padding:"8px 14px",background:"rgba(239,68,68,.2)",border:"none",borderRadius:8,color:"#FCA5A5",fontSize:11,cursor:"pointer"}}>🗑 Supprimer</button>
        <button onClick={function(){setViewer(null)}} style={{padding:"8px 14px",background:"rgba(255,255,255,.1)",border:"none",borderRadius:8,color:"#FFF",fontSize:11,cursor:"pointer"}}>✕ Fermer</button>
      </div>
      <img src={viewer.url} alt="" style={{maxWidth:"90vw",maxHeight:"80vh",objectFit:"contain",borderRadius:8}} onClick={function(e){e.stopPropagation()}} />
      <div style={{marginTop:10,color:"#94A3B8",fontSize:11}}>{viewer.name} — {CATS.find(function(c){return c[0]===viewer.cat})?CATS.find(function(c){return c[0]===viewer.cat})[1]:""} — {viewer.date?new Date(viewer.date).toLocaleString("fr-FR"):""}</div>
      {/* Navigation */}
      {photos.length > 1 && <div style={{display:"flex",gap:12,marginTop:10}}>
        <button onClick={function(e){e.stopPropagation();var idx=photos.findIndex(function(p){return p.id===viewer.id});if(idx>0)setViewer(photos[idx-1])}} style={{padding:"8px 16px",background:"rgba(255,255,255,.1)",border:"none",borderRadius:8,color:"#FFF",fontSize:14,cursor:"pointer"}}>◀</button>
        <button onClick={function(e){e.stopPropagation();var idx=photos.findIndex(function(p){return p.id===viewer.id});if(idx<photos.length-1)setViewer(photos[idx+1])}} style={{padding:"8px 16px",background:"rgba(255,255,255,.1)",border:"none",borderRadius:8,color:"#FFF",fontSize:14,cursor:"pointer"}}>▶</button>
      </div>}
    </div>}
  </div>;
}

/* === PIECES TAB === */
function PiecesTab({d, up, sT}) {
  // Migration anciennes pièces
  var initPcs = (d.pcs || []).map(function(piece) {
    var out = {...piece};
    if(out.pv === undefined || out.pv === null) out.pv = out.p || 0;
    if(out.pa === undefined || out.pa === null) out.pa = out.p || 0;
    return out;
  });

  // Brouillon local — rien ne part Firebase tant qu'on clique pas Appliquer
  const [draft, setDraft] = useState(JSON.parse(JSON.stringify(initPcs)));
  const [saved, setSaved] = useState(true);
  const [ad, sA] = useState(false);
  const [np, sN] = useState({ref:"",d:"",q:1,pv:0,pa:0,f:""});
  const [sel, setSel] = useState({});

  // Sync quand Firebase change ET qu'on n'a pas de modifs en cours
  useEffect(function(){
    if(saved) {
      var fresh = (d.pcs || []).map(function(piece) {
        var out = {...piece};
        if(out.pv === undefined || out.pv === null) out.pv = out.p || 0;
        if(out.pa === undefined || out.pa === null) out.pa = out.p || 0;
        return out;
      });
      setDraft(JSON.parse(JSON.stringify(fresh)));
    }
  }, [d.pcs]);

  // Calculs sur le brouillon
  var totalChiffrage = draft.reduce(function(a,p){return a+(p.q||0)*(p.pv||0)},0);
  var totalAchat = draft.reduce(function(a,p){return a+(p.q||0)*(p.pa||0)},0);
  var margeEuro = totalChiffrage - totalAchat;
  var margePct = totalChiffrage>0?Math.round((margeEuro/totalChiffrage)*100):null;
  var margeColor = margePct===null?"#8B5CF6":margePct<45?"#EF4444":margePct<=55?"#F97316":margePct<=60?"#EAB308":"#10B981";

  // Modifier le brouillon (PAS Firebase)
  var updateDraft = function(newPcs) {
    setDraft(newPcs);
    setSaved(false);
  };

  // Sauvegarder dans Firebase
  var appliquer = function() {
    var chiff = draft.reduce(function(a,p){return a+(p.q||0)*(p.pv||0)},0);
    up(d.id, {pcs: draft, mt: String(Math.round(chiff*100)/100)});
    setSaved(true);
  };

  // Annuler les modifs
  var annuler = function() {
    var fresh = (d.pcs || []).map(function(piece) {
      var out = {...piece};
      if(out.pv === undefined || out.pv === null) out.pv = out.p || 0;
      if(out.pa === undefined || out.pa === null) out.pa = out.p || 0;
      return out;
    });
    setDraft(JSON.parse(JSON.stringify(fresh)));
    setSaved(true);
  };

  return <div>
    {/* Bandeau modifs non enregistrées */}
    {!saved && <div style={{background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:8,padding:"8px 14px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between",animation:"fi .2s"}}>
      <span style={{fontSize:11,color:"#F59E0B",fontWeight:600}}>⚠️ Modifications non enregistrées</span>
      <div style={{display:"flex",gap:6}}>
        <button onClick={annuler} style={{padding:"5px 12px",background:"rgba(239,68,68,0.15)",border:"none",borderRadius:6,color:"#FCA5A5",fontSize:10,cursor:"pointer",fontWeight:600}}>✕ Annuler</button>
        <button onClick={appliquer} style={{padding:"5px 14px",background:"linear-gradient(135deg,#10B981,#059669)",border:"none",borderRadius:6,color:"white",fontSize:10,cursor:"pointer",fontWeight:700}}>✓ Appliquer</button>
      </div>
    </div>}

    <div style={{display:"flex",justifyContent:"space-between",marginBottom:9}}>
      <p style={{color:"#94A3B8",fontSize:11}}>{draft.length} ligne{draft.length>1?"s":""}</p>
      <button onClick={() => sA(!ad)} style={S.b}>{ad?"✕":"+ Ajouter"}</button>
    </div>
    {ad && <div style={{...S.c,padding:"12px",marginBottom:10}}>
      <div style={{display:"grid",gridTemplateColumns:"80px 1fr 50px 75px 75px 90px",gap:6,alignItems:"end"}}>
        <div><label style={S.l}>Réf</label><input style={S.i} value={np.ref} onChange={e=>sN({...np,ref:e.target.value})} /></div>
        <div><label style={S.l}>Désignation*</label><input style={S.i} value={np.d} onChange={e=>sN({...np,d:e.target.value})} /></div>
        <div><label style={S.l}>Qté</label><input type="number" style={S.i} value={np.q} onChange={e=>sN({...np,q:+e.target.value||0})} /></div>
        <div><label style={{...S.l,color:"#10B981"}}>Chiffrage €</label><input type="number" style={S.i} value={np.pv} onChange={e=>sN({...np,pv:+e.target.value||0})} /></div>
        <div><label style={{...S.l,color:"#F97316"}}>Px Achat €</label><input type="number" style={S.i} value={np.pa} onChange={e=>sN({...np,pa:+e.target.value||0})} /></div>
        <div><label style={S.l}>Fourn.</label><input style={S.i} value={np.f} onChange={e=>sN({...np,f:e.target.value})} /></div>
      </div>
      <div style={{textAlign:"right",marginTop:7}}><button onClick={function(){if(!np.d)return;updateDraft([...draft,{...np,id:uid()}]);sN({ref:"",d:"",q:1,pv:0,pa:0,f:""});sA(false)}} style={S.b}>✓ Ajouter</button></div>
    </div>}
    <div style={{...S.c,overflow:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:650}}>
      <thead><tr style={{borderBottom:"2px solid #334155"}}>
        <th style={{padding:"8px",width:30}}><input type="checkbox" checked={draft.length>0&&draft.every(function(p){return sel[p.id||p.d]})} onChange={function(e){var ns={};if(e.target.checked)draft.forEach(function(p){ns[p.id||p.d]=true});setSel(ns)}} /></th>
        <th style={{padding:"8px",textAlign:"left",color:"#94A3B8",fontSize:9}}>Réf</th>
        <th style={{padding:"8px",textAlign:"left",color:"#94A3B8",fontSize:9}}>Désignation</th>
        <th style={{padding:"8px",textAlign:"center",color:"#94A3B8",fontSize:9}}>Qté</th>
        <th style={{padding:"8px",textAlign:"right",color:"#10B981",fontSize:9}}>Chiffrage</th>
        <th style={{padding:"8px",textAlign:"right",color:"#F97316",fontSize:9}}>Px Achat</th>
        <th style={{padding:"8px",textAlign:"right",color:"#8B5CF6",fontSize:9}}>Marge</th>
        <th style={{padding:"8px",textAlign:"left",color:"#94A3B8",fontSize:9}}>Fourn</th>
        <th style={{padding:"8px",fontSize:9}}></th>
      </tr></thead>
      <tbody>{draft.map(function(p,i) {
        var chL = (p.q||0)*(p.pv||0);
        var acL = (p.q||0)*(p.pa||0);
        var mgL = chL - acL;
        var mpL = chL>0?Math.round((mgL/chL)*100):0;
        var mc = acL===0?"#64748B":mpL<45?"#EF4444":mpL<=55?"#F97316":mpL<=60?"#EAB308":"#10B981";
        return <tr key={p.id||i} style={{borderBottom:"1px solid #33415525",background:i%2?"#172033":"#1E293B"}}>
          <td style={{padding:"6px 8px"}}><input type="checkbox" checked={!!sel[p.id||p.d]} onChange={function(){var ns={...sel};if(ns[p.id||p.d])delete ns[p.id||p.d];else ns[p.id||p.d]=true;setSel(ns)}} /></td>
          <td style={{padding:"6px 8px",fontFamily:"monospace",fontSize:9,color:"#94A3B8"}}>{p.ref||"—"}</td>
          <td style={{padding:"6px 8px",fontWeight:500}}>{p.d}</td>

        var url = "https://wa.me/"+phone+"?text="+encodeURIComponent(msg);

      };
      return <div style={{textAlign:"center",marginTop:12}}>
        <button onClick={commandeWhatsApp} style={{padding:"12px 28px",background:"linear-gradient(135deg,#25D366,#128C7E)",border:"none",borderRadius:10,color:"white",fontSize:13,cursor:"pointer",fontWeight:700,display:"inline-flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:18}}>📱</span> Commander {isAll?"toutes les":""+count} pièce{count>1?"s":""} via WhatsApp
        </button>
        {isAll && <div style={{fontSize:9,color:"#64748B",marginTop:4}}>💡 Cochez des pièces pour envoyer une sélection</div>}
      </div>;
    })()}

    {/* Bouton Transformer / Mettre à jour facture */}
    {draft.length>0 && <div style={{textAlign:"center",marginTop:12}}>
      <button onClick={function(){
        var existFac = d.facture || {};
        var hasExisting = existFac.lignes && existFac.lignes.length > 0;
        var moData = d.mainOeuvre || [];
        var peinture = d.peinture || [];
        var ingredients = d.ingredients || [];
        var newLignes = [];
        // Pièces depuis le brouillon actuel
        draft.forEach(function(p){
          // Chercher si cette pièce existe déjà dans la facture (garder sa remise)
          var existLigne = hasExisting ? (existFac.lignes||[]).find(function(l){return l.id===p.id && l.type==="piece"}) : null;
          newLignes.push({id:p.id||uid(),type:"piece",ref:p.ref||"",designation:p.d||"",qte:p.q||1,prixHT:p.pv||0,remise:existLigne?existLigne.remise:0});
        });
        // MO : garder les lignes MO existantes si facture existe, sinon importer du rapport
        if(hasExisting) {
          (existFac.lignes||[]).forEach(function(l){
            if(l.type==="mo") newLignes.push(l);
          });
        } else {
          moData.forEach(function(m){
            newLignes.push({id:uid(),type:"mo",ref:"",designation:m.designation||"Main d'œuvre",qte:m.heures||1,prixHT:m.tauxHoraire||0,remise:0});
          });
          peinture.forEach(function(p2){
            newLignes.push({id:uid(),type:"mo",ref:"",designation:p2.designation||"Peinture",qte:p2.heures||1,prixHT:p2.tauxHoraire||0,remise:0});
          });
          ingredients.forEach(function(ig){
            newLignes.push({id:uid(),type:"mo",ref:"",designation:ig.designation||"Ingrédients",qte:ig.heures||1,prixHT:ig.tauxHoraire||0,remise:0});
          });
        }
        // Lignes manuelles ajoutées dans la facture (ni piece ni mo standard)
        if(hasExisting) {
          (existFac.lignes||[]).forEach(function(l){
            if(l.type!=="piece" && l.type!=="mo") newLignes.push(l);
          });
        }
        var totalHT = newLignes.reduce(function(a,l){
          var ht = (l.qte||0)*(l.prixHT||0);
          return a + ht - ht*((l.remise||0)/100);
        },0);
        var rg = existFac.remiseGlobale || 0;
        totalHT = totalHT - totalHT*(rg/100);
        var totalTVA = totalHT*0.20;
        var totalTTC = totalHT+totalTVA;
        up(d.id, {facture:{
          num: existFac.num || "FAC-2026-",
          date: existFac.date || new Date().toISOString().slice(0,10),
          remiseGlobale: rg,
          lignes: newLignes,
          totalHT:Math.round(totalHT*100)/100,
          totalTVA:Math.round(totalTVA*100)/100,
          totalTTC:Math.round(totalTTC*100)/100
        }});
        if(sT) sT("factu");
      }} style={{padding:"12px 28px",background:d.facture&&d.facture.lignes?"linear-gradient(135deg,#3B82F6,#2563EB)":"linear-gradient(135deg,#F59E0B,#D97706)",border:"none",borderRadius:10,color:d.facture&&d.facture.lignes?"#FFF":"#0F172A",fontSize:13,cursor:"pointer",fontWeight:700,display:"inline-flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:18}}>🧾</span> {d.facture&&d.facture.lignes?"Mettre à jour la facture":"Transformer en facture"}
      </button>
      {d.facture&&d.facture.lignes && <div style={{fontSize:9,color:"#60A5FA",marginTop:4}}>📌 La facture existante sera mise à jour avec les pièces actuelles</div>}
    </div>}
  </div>;
}
