        <button onClick={function(){var d=new Date(timeDate);d.setDate(d.getDate()-1);setTimeDate(d.toISOString().slice(0,10))}} style={{...S.b,padding:"5px 10px"}}>←</button>
        <input type="date" value={timeDate} onChange={function(e){setTimeDate(e.target.value)}} style={{...S.i,width:150,textAlign:"center"}} />
        <button onClick={function(){var d=new Date(timeDate);d.setDate(d.getDate()+1);setTimeDate(d.toISOString().slice(0,10))}} style={{...S.b,padding:"5px 10px"}}>→</button>
        <button onClick={function(){setTimeDate(new Date().toISOString().slice(0,10))}} style={{...S.b,padding:"5px 10px",fontSize:9}}>Aujourd'hui</button>
      </div>}
      {(function(){
        // Agréger par utilisateur
        var byUser = {};
        timeData.forEach(function(t){
          if(!byUser[t.userId]) byUser[t.userId] = {nom:t.userName,role:t.userRole,totalMin:0,days:{},lastSeen:null,logins:[]};
          byUser[t.userId].totalMin += (t.minutes||0);
          byUser[t.userId].days[t.date] = (byUser[t.userId].days[t.date]||0) + (t.minutes||0);
          if(t.lastSeen && (!byUser[t.userId].lastSeen || t.lastSeen > byUser[t.userId].lastSeen)) byUser[t.userId].lastSeen = t.lastSeen;
          if(t.loginAt) byUser[t.userId].logins = byUser[t.userId].logins.concat(t.loginAt);
        });
        var userList = Object.keys(byUser).map(function(uid2){return {...byUser[uid2],id:uid2}});
        userList.sort(function(a,b){return b.totalMin - a.totalMin});

        if(userList.length===0) return <div style={{textAlign:"center",padding:20,color:"#64748B",fontSize:11}}>Aucune activité {timeWeek?"cette semaine":"ce jour"}</div>;

        return <div>
          {userList.map(function(u){
            var h = Math.floor(u.totalMin/60);
            var m = u.totalMin%60;
            var timeStr = h>0 ? h+"h"+String(m).padStart(2,"0") : m+"min";
            var rc = ROLES.find(function(r){return r.id===u.role});
            var col = rc?rc.c:"#94A3B8";
            var maxMin = timeWeek?2400:480;
            var pct = Math.min(100,Math.round(u.totalMin/maxMin*100));
            var isOnline = u.lastSeen && (new Date()-new Date(u.lastSeen))<120000;
            return <div key={u.id} style={{marginBottom:8,background:"#0F172A",borderRadius:8,padding:"12px",border:"1px solid #334155"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:8,height:8,borderRadius:4,background:isOnline?"#10B981":"#475569"}}></div>
                  <span style={{fontWeight:600,fontSize:12}}>{u.nom}</span>
                  <span style={{fontSize:9,color:col}}>{rc?rc.l:""}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontWeight:700,fontSize:14,color:"#F59E0B"}}>{timeStr}</span>
                  {isOnline && <span style={{fontSize:8,color:"#10B981",background:"rgba(16,185,129,0.1)",padding:"2px 6px",borderRadius:4}}>EN LIGNE</span>}
                </div>
              </div>
              <div style={{height:6,background:"#1E293B",borderRadius:3,overflow:"hidden"}}>
                <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,#F59E0B,#D97706)",borderRadius:3,transition:"width 0.5s"}}></div>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                <span style={{fontSize:8,color:"#64748B"}}>{u.logins.length} connexion{u.logins.length>1?"s":""}</span>
                <span style={{fontSize:8,color:"#64748B"}}>{u.lastSeen?"Vu à "+new Date(u.lastSeen).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}):""}</span>
              </div>
              {timeWeek && Object.keys(u.days).length>1 && <div style={{display:"flex",gap:4,marginTop:6,flexWrap:"wrap"}}>
                {Object.keys(u.days).sort().map(function(day){
                  var dm = u.days[day]; var dh=Math.floor(dm/60);var dmm=dm%60;
                  return <span key={day} style={{fontSize:8,background:"#1E293B",padding:"2px 6px",borderRadius:4,color:"#94A3B8"}}>{day.slice(5)}: {dh>0?dh+"h"+String(dmm).padStart(2,"0"):dmm+"min"}</span>;
                })}
              </div>}
            </div>;
          })}
        </div>;
      })()}
    </div>}
  </div>;
}

/* === FACTURE === */
function FactureTab({d, up}) {
  var facture = d.facture || {};
  var [numFac, setNumFac] = useState(facture.num || "FAC-2026-");
  var [dateFac, setDateFac] = useState(facture.date || new Date().toISOString().slice(0,10));
  var [remiseGlobale, setRemiseGlobale] = useState(facture.remiseGlobale || 0);
  var [lignes, setLignes] = useState(facture.lignes || []);
  var [saved, setSaved] = useState(true);
  var [showPrint, setShowPrint] = useState(false);

  // Entreprise
  var ENT = {
    nom: "RAPIDE DÉPANNAGE",
    enseigne: "Point S Guignes",
    adresse: "24 Rue Saint Abdon",
    cp: "77390",
    ville: "Guignes",
    tel: "01 89 43 16 83",
    siret: "844 838 854 00025",
    rcs: "RCS Melun 844 838 854",
    tva: "FR82 844838854",
    forme: "SAS au capital de 10 000 €"
  };

  // Sync lignes depuis pièces du dossier (auto-import)
  var autoImport = function() {
    var pcs = d.pcs || [];
    var moData = d.mainOeuvre || [];
    var newLignes = [];
    // Pièces
    pcs.forEach(function(p) {
      newLignes.push({
        id: p.id || uid(),
        type: "piece",
        ref: p.ref || "",
        designation: p.d || "",
        qte: p.q || 1,
        prixHT: p.pv || 0,
        remise: 0
      });
    });
    // Main d'oeuvre depuis rapport IA
    moData.forEach(function(m) {
      newLignes.push({
        id: uid(),
        type: "mo",
        ref: "",
        designation: m.designation || "Main d'œuvre",
        qte: m.heures || 1,
        prixHT: m.tauxHoraire || 0,
        remise: 0
      });
    });
    // Peinture
    (d.peinture || []).forEach(function(p) {
      newLignes.push({
        id: uid(),
        type: "mo",
        ref: "",
        designation: p.designation || "Peinture",
        qte: p.heures || 1,
        prixHT: p.tauxHoraire || 0,
        remise: 0
      });
    });
    // Ingrédients
    (d.ingredients || []).forEach(function(ig) {
      newLignes.push({
        id: uid(),
        type: "mo",
        ref: "",
        designation: ig.designation || "Ingrédients",
        qte: ig.heures || 1,
        prixHT: ig.tauxHoraire || 0,
        remise: 0
      });
    });
    setLignes(newLignes);
    setSaved(false);
  };

  // Ajouter ligne manuelle
  var [showAdd, setShowAdd] = useState(false);
  var [nl, setNl] = useState({ref:"",designation:"",qte:1,prixHT:0,remise:0,type:"piece"});
  var addLigne = function() {
    if(!nl.designation) return;
    setLignes([...lignes, {...nl, id:uid()}]);
    setNl({ref:"",designation:"",qte:1,prixHT:0,remise:0,type:"piece"});
    setShowAdd(false);
    setSaved(false);
  };

  // Modifier ligne
  var updateLigne = function(idx, field, val) {
    var nl2 = lignes.map(function(l,i){
      if(i!==idx) return l;
      var u = {...l};
      u[field] = val;
      return u;
    });
    setLignes(nl2);
    setSaved(false);
  };

  // Supprimer ligne
  var delLigne = function(idx) {
    setLignes(lignes.filter(function(_,i){return i!==idx}));
    setSaved(false);
  };

  // Calculs
  var totalHTBrut = lignes.reduce(function(a,l){return a + (l.qte||0)*(l.prixHT||0)}, 0);
  var totalRemiseLigne = lignes.reduce(function(a,l){
    var ht = (l.qte||0)*(l.prixHT||0);
    return a + ht * ((l.remise||0)/100);
  }, 0);
  var totalHTApresRemiseLigne = totalHTBrut - totalRemiseLigne;
  var montantRemiseGlobale = totalHTApresRemiseLigne * ((remiseGlobale||0)/100);
  var totalHT = totalHTApresRemiseLigne - montantRemiseGlobale;
  var totalTVA = totalHT * 0.20;
  var totalTTC = totalHT + totalTVA;

  // Sauvegarder
  var sauvegarder = function() {
    up(d.id, {facture: {
      num: numFac,
      date: dateFac,
      remiseGlobale: remiseGlobale,
      lignes: lignes,
      totalHT: Math.round(totalHT*100)/100,
      totalTVA: Math.round(totalTVA*100)/100,
      totalTTC: Math.round(totalTTC*100)/100
    }});
    setSaved(true);
  };

  // Impression
  var imprimer = function() {
    var w = window.open("","_blank");
    var html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Facture '+numFac+'</title><style>'
      +'*{margin:0;padding:0;box-sizing:border-box;font-family:Helvetica,Arial,sans-serif}'
      +'body{padding:30px;color:#1a1a1a;font-size:11px}'
      +'.header{display:flex;justify-content:space-between;margin-bottom:30px}'
      +'.ent{font-size:11px;line-height:1.6}'
      +'.ent .nom{font-size:18px;font-weight:700;color:#D97706}'
      +'.ent .enseigne{font-size:12px;color:#666;font-weight:600}'
      +'.facnum{text-align:right}'
      +'.facnum .titre{font-size:22px;font-weight:700;color:#1a1a1a}'
      +'.facnum .num{font-size:14px;color:#D97706;font-weight:600}'
      +'.client-box{background:#f8f8f8;border:1px solid #ddd;border-radius:6px;padding:14px 18px;margin-bottom:20px;max-width:320px;margin-left:auto}'
      +'.client-box .label{font-size:9px;color:#999;text-transform:uppercase;font-weight:600;margin-bottom:4px}'
      +'.vehicule{background:#FFF7ED;border:1px solid #FDBA74;border-radius:6px;padding:10px 14px;margin-bottom:20px;font-size:10px}'
      +'table{width:100%;border-collapse:collapse;margin-bottom:16px}'
      +'th{background:#f5f5f5;padding:8px 10px;text-align:left;font-size:9px;text-transform:uppercase;color:#666;border-bottom:2px solid #ddd}'
      +'td{padding:7px 10px;border-bottom:1px solid #eee;font-size:10px}'
      +'.right{text-align:right}'
      +'.totaux{margin-left:auto;width:280px;margin-top:10px}'
      +'.totaux tr td{padding:5px 10px;font-size:11px}'
      +'.totaux .ttc{font-size:16px;font-weight:700;color:#D97706;border-top:2px solid #D97706}'
      +'.footer{margin-top:40px;text-align:center;font-size:8px;color:#999;border-top:1px solid #ddd;padding-top:10px}'
      +'@media print{body{padding:15px}}'
      +'</style></head><body>'
      +'<div class="header"><div class="ent">'
      +'<div class="nom">'+ENT.nom+'</div>'
      +'<div class="enseigne">'+ENT.enseigne+'</div>'
      +'<div>'+ENT.adresse+'</div>'
      +'<div>'+ENT.cp+' '+ENT.ville+'</div>'
      +'<div>Tél : '+ENT.tel+'</div>'
      +'<div style="margin-top:6px;font-size:9px;color:#666">SIRET : '+ENT.siret+'</div>'
      +'<div style="font-size:9px;color:#666">'+ENT.rcs+'</div>'
      +'<div style="font-size:9px;color:#666">TVA : '+ENT.tva+'</div>'
      +'</div><div class="facnum">'
      +'<div class="titre">FACTURE</div>'
      +'<div class="num">'+numFac+'</div>'
      +'<div style="margin-top:6px">Date : '+new Date(dateFac).toLocaleDateString("fr-FR")+'</div>'
      +'</div></div>'
      +'<div class="client-box"><div class="label">Client</div>'
      +'<div style="font-weight:600;font-size:13px">'+(d.cli||"")+'</div>'
      +'<div>'+(d.adresseClient||"")+'</div>'
      +'<div>'+(d.tel||"")+'</div>'
      +'</div>'
      +'<div class="vehicule"><strong>Véhicule :</strong> '+(d.veh||"")
      +' — <strong>Immat :</strong> '+(d.imm||"")
      +(d.num?' — <strong>Dossier :</strong> '+d.num:'')
      +(d.numSinistre?' — <strong>Sinistre :</strong> '+d.numSinistre:'')
      +'</div>'
      +'<table><thead><tr>'
      +'<th>Réf</th><th>Désignation</th><th class="right">Qté</th>'
      +'<th class="right">P.U. HT</th><th class="right">Remise</th>'
      +'<th class="right">Total HT</th></tr></thead><tbody>';
    lignes.forEach(function(l){
      var ht = (l.qte||0)*(l.prixHT||0);
      var rem = ht * ((l.remise||0)/100);
      var net = ht - rem;
      html += '<tr><td>'+(l.ref||"—")+'</td><td>'+(l.designation||"")+(l.type==="mo"?' <span style="color:#999;font-size:9px">(MO)</span>':'')+'</td>'
        +'<td class="right">'+(l.qte||0)+'</td>'
        +'<td class="right">'+(l.prixHT||0).toFixed(2)+' €</td>'
        +'<td class="right">'+(l.remise?l.remise+'%':"—")+'</td>'
        +'<td class="right" style="font-weight:600">'+net.toFixed(2)+' €</td></tr>';
    });
    html += '</tbody></table>';
    html += '<table class="totaux"><tbody>';
    html += '<tr><td>Total HT brut</td><td class="right">'+totalHTBrut.toFixed(2)+' €</td></tr>';
    if(totalRemiseLigne>0) html += '<tr><td>Remises lignes</td><td class="right" style="color:#D97706">-'+totalRemiseLigne.toFixed(2)+' €</td></tr>';
    if(remiseGlobale>0) html += '<tr><td>Remise globale ('+remiseGlobale+'%)</td><td class="right" style="color:#D97706">-'+montantRemiseGlobale.toFixed(2)+' €</td></tr>';
    html += '<tr><td style="font-weight:600">Total HT</td><td class="right" style="font-weight:600">'+totalHT.toFixed(2)+' €</td></tr>';
    html += '<tr><td>TVA 20%</td><td class="right">'+totalTVA.toFixed(2)+' €</td></tr>';
    html += '<tr><td class="ttc">Total TTC</td><td class="right ttc">'+totalTTC.toFixed(2)+' €</td></tr>';
    html += '</tbody></table>';
    if(d.fr) html += '<div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:6px;padding:8px 12px;font-size:10px;margin-top:10px"><strong>Franchise :</strong> '+(d.fr||0)+' € — <strong>Reste à charge assureur :</strong> '+(totalTTC-(+d.fr||0)).toFixed(2)+' €</div>';
    html += '<div class="footer">';
    html += ENT.nom+' — '+ENT.forme+' — '+ENT.adresse+', '+ENT.cp+' '+ENT.ville;
    html += '<br>SIRET '+ENT.siret+' — '+ENT.rcs+' — TVA '+ENT.tva;
    html += '</div></body></html>';
    w.document.write(html);
    w.document.close();
    setTimeout(function(){w.print()},300);
  };

  return <div>
    {/* Bandeau non sauvegardé */}
    {!saved && <div style={{background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:8,padding:"8px 14px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between",animation:"fi .2s"}}>
      <span style={{fontSize:11,color:"#F59E0B",fontWeight:600}}>⚠️ Modifications non enregistrées</span>
      <div style={{display:"flex",gap:6}}>
        <button onClick={sauvegarder} style={{padding:"5px 14px",background:"linear-gradient(135deg,#10B981,#059669)",border:"none",borderRadius:6,color:"white",fontSize:10,cursor:"pointer",fontWeight:700}}>✓ Sauvegarder</button>

      </div>
      <div style={{width:150}}>
        <label style={S.l}>Date</label>
        <input type="date" style={S.i} value={dateFac} onChange={function(e){setDateFac(e.target.value);setSaved(false)}} />
      </div>
      <div style={{width:100}}>
        <label style={S.l}>Remise globale %</label>
        <input type="number" style={S.i} value={remiseGlobale} onChange={function(e){setRemiseGlobale(+e.target.value||0);setSaved(false)}} />

      <button onClick={autoImport} style={{padding:"9px 14px",background:"linear-gradient(135deg,#3B82F6,#2563EB)",border:"none",borderRadius:8,color:"white",fontSize:10,cursor:"pointer",fontWeight:700}}>🔄 Importer depuis IA + Pièces</button>
      <button onClick={function(){setShowAdd(!showAdd)}} style={S.b}>{showAdd?"✕":"+ Ligne"}</button>
    </div>

    {/* Ajout ligne manuelle */}
    {showAdd && <div style={{...S.c,padding:"12px",marginBottom:10}}>
      <div style={{display:"grid",gridTemplateColumns:"70px 1fr 50px 80px 70px 90px",gap:6,alignItems:"end"}}>
        <div><label style={S.l}>Réf</label><input style={S.i} value={nl.ref} onChange={function(e){setNl({...nl,ref:e.target.value})}} /></div>
        <div><label style={S.l}>Désignation*</label><input style={S.i} value={nl.designation} onChange={function(e){setNl({...nl,designation:e.target.value})}} /></div>
        <div><label style={S.l}>Qté</label><input type="number" style={S.i} value={nl.qte} onChange={function(e){setNl({...nl,qte:+e.target.value||0})}} /></div>
        <div><label style={S.l}>Prix HT €</label><input type="number" style={S.i} value={nl.prixHT} onChange={function(e){setNl({...nl,prixHT:+e.target.value||0})}} /></div>
        <div><label style={S.l}>Remise %</label><input type="number" style={S.i} value={nl.remise} onChange={function(e){setNl({...nl,remise:+e.target.value||0})}} /></div>
        <div><label style={S.l}>Type</label><select style={S.i} value={nl.type} onChange={function(e){setNl({...nl,type:e.target.value})}}>

        </select></div>
      </div>
      <div style={{textAlign:"right",marginTop:7}}><button onClick={addLigne} style={S.b}>✓ Ajouter</button></div>
    </div>}

    {/* Tableau facture */}
    <div style={{...S.c,overflow:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:600}}>
      <thead><tr style={{borderBottom:"2px solid #334155"}}>
        <th style={{padding:"8px",textAlign:"left",color:"#94A3B8",fontSize:9}}>Réf</th>
        <th style={{padding:"8px",textAlign:"left",color:"#94A3B8",fontSize:9}}>Désignation</th>
        <th style={{padding:"8px",textAlign:"center",color:"#94A3B8",fontSize:9}}>Qté</th>
        <th style={{padding:"8px",textAlign:"right",color:"#94A3B8",fontSize:9}}>P.U. HT</th>
        <th style={{padding:"8px",textAlign:"right",color:"#F59E0B",fontSize:9}}>Remise %</th>
        <th style={{padding:"8px",textAlign:"right",color:"#10B981",fontSize:9}}>Total HT</th>
        <th style={{padding:"8px",fontSize:9}}></th>
      </tr></thead>
      <tbody>{lignes.map(function(l,i) {
        var ht = (l.qte||0)*(l.prixHT||0);
        var rem = ht * ((l.remise||0)/100);
        var net = ht - rem;
        return <tr key={l.id||i} style={{borderBottom:"1px solid #33415525",background:i%2?"#172033":"#1E293B"}}>
          <td style={{padding:"6px 8px",fontFamily:"monospace",fontSize:9,color:"#94A3B8"}}>{l.ref||"—"}</td>
          <td style={{padding:"6px 8px",fontWeight:500}}>
            {l.designation}
            {l.type==="mo" && <span style={{fontSize:8,color:"#60A5FA",marginLeft:4}}>(MO)</span>}
          </td>
          <td style={{padding:"6px 8px"}}><input type="number" value={l.qte} onChange={function(e){updateLigne(i,"qte",+e.target.value||0)}} style={{...S.i,width:45,padding:"3px",textAlign:"center"}} /></td>
          <td style={{padding:"6px 8px"}}><input type="number" value={l.prixHT} onChange={function(e){updateLigne(i,"prixHT",+e.target.value||0)}} style={{...S.i,width:75,padding:"3px",textAlign:"right"}} /></td>
          <td style={{padding:"6px 8px"}}><input type="number" value={l.remise||0} onChange={function(e){updateLigne(i,"remise",+e.target.value||0)}} style={{...S.i,width:55,padding:"3px",textAlign:"right",borderColor:"#F59E0B40"}} /></td>
          <td style={{padding:"6px 8px",textAlign:"right",fontWeight:700,fontFamily:"monospace",color:"#10B981"}}>{net.toFixed(2)}€</td>

    </table></div>

    {/* Totaux */}
    <div style={{display:"flex",justifyContent:"flex-end",marginTop:12}}>
      <div style={{width:280}}>
        <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",fontSize:11,color:"#94A3B8"}}><span>Total HT brut</span><span style={{fontFamily:"monospace"}}>{totalHTBrut.toFixed(2)} €</span></div>
        {totalRemiseLigne>0 && <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:11,color:"#F59E0B"}}><span>Remises lignes</span><span style={{fontFamily:"monospace"}}>-{totalRemiseLigne.toFixed(2)} €</span></div>}
        {remiseGlobale>0 && <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:11,color:"#F59E0B"}}><span>Remise globale ({remiseGlobale}%)</span><span style={{fontFamily:"monospace"}}>-{montantRemiseGlobale.toFixed(2)} €</span></div>}
        <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",fontSize:12,fontWeight:600,borderTop:"1px solid #334155"}}><span>Total HT</span><span style={{fontFamily:"monospace"}}>{totalHT.toFixed(2)} €</span></div>
        <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:11,color:"#94A3B8"}}><span>TVA 20%</span><span style={{fontFamily:"monospace"}}>{totalTVA.toFixed(2)} €</span></div>
        <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",fontSize:18,fontWeight:700,color:"#F59E0B",borderTop:"2px solid #F59E0B"}}><span>Total TTC</span><span style={{fontFamily:"monospace"}}>{totalTTC.toFixed(2)} €</span></div>
        {d.fr && <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:10,color:"#EF4444"}}><span>Franchise</span><span style={{fontFamily:"monospace"}}>{d.fr} €</span></div>}
        {d.fr && <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:10,color:"#06B6D4"}}><span>Reste assureur</span><span style={{fontFamily:"monospace"}}>{(totalTTC-(+d.fr||0)).toFixed(2)} €</span></div>}
      </div>
    </div>

    {/* Boutons */}
    <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:16}}>
      <button onClick={sauvegarder} style={{padding:"10px 24px",background:"linear-gradient(135deg,#10B981,#059669)",border:"none",borderRadius:8,color:"white",fontSize:12,cursor:"pointer",fontWeight:700}}>💾 Sauvegarder</button>
      <button onClick={imprimer} style={{padding:"10px 24px",background:"linear-gradient(135deg,#3B82F6,#2563EB)",border:"none",borderRadius:8,color:"white",fontSize:12,cursor:"pointer",fontWeight:700}}>🖨 Imprimer / PDF</button>
    </div>
  </div>;
}

/* === ORDRE DE REPARATION === */
function ORTab({d, up}) {
  const [uploading, setUploading] = useState(false);
  const ref = useRef(null);

  const handleFile = async function(f) {
    if (!f || !f.type.includes("pdf")) return alert("Fichier PDF uniquement");
    setUploading(true);
    try {
      var spath = "dossiers/"+d.id+"/or/"+uid()+"_"+f.name;
      var uploaded = await uploadToStorage(spath, f);
      // Supprimer ancien si existait
      if(d.orPdf && d.orPdf.storagePath) await deleteFromStorage(d.orPdf.storagePath);
      up(d.id, {orPdf: {name:f.name, size:f.size, date:new Date().toISOString(), url:uploaded.url, storagePath:uploaded.storagePath}});
    } catch(e) { alert("Erreur upload: "+e.message); }
    setUploading(false);
  };

  var current = d.orPdf || null;
  var hasGenerated = d.orHtml && d.orDate;

  var viewOR = function() {
    var w = window.open("","","width=800,height=1000");
    w.document.write(d.orHtml);
    w.document.close();
    w.focus();
  };

  var printOR = function() {
    var w = window.open("","","width=800,height=1000");
    w.document.write(d.orHtml);
    w.document.close();
    w.focus();
    setTimeout(function(){w.print()},400);
  };

  var deleteOR = function() {
    if(confirm("Supprimer l'OR généré ?")) up(d.id, {orHtml: null, orDate: null});
  };

  var deleteUploadedOR = async function() {
    if(!confirm("Supprimer l'OR uploadé ?")) return;
    if(current && current.storagePath) await deleteFromStorage(current.storagePath);
    up(d.id, {orPdf: null});
  };

  return <div>
    <h3 style={{fontSize:14,fontWeight:600,marginBottom:14}}>📄 Ordre de réparation</h3>

    {hasGenerated && <div style={{...S.c,padding:"16px",marginBottom:14,border:"1px solid rgba(139,92,246,0.3)",animation:"fi .2s"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:28}}>🤖</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:600,fontSize:12,color:"#A78BFA"}}>OR généré par l'IA</div>
          <div style={{fontSize:10,color:"#94A3B8"}}>{new Date(d.orDate).toLocaleString("fr-FR")}</div>
        </div>
        <button onClick={viewOR} style={S.b}>👁 Voir</button>
        <button onClick={printOR} style={{...S.b,background:"linear-gradient(135deg,#8B5CF6,#7C3AED)",color:"#FFF"}}>🖨 Imprimer</button>
        <button onClick={deleteOR} style={{padding:"8px 10px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.15)",borderRadius:8,color:"#FCA5A5",fontSize:11,cursor:"pointer"}}>🗑</button>
      </div>
    </div>}

    <div onDragOver={function(e){e.preventDefault()}} onDrop={function(e){e.preventDefault();handleFile(e.dataTransfer.files[0])}} onClick={function(){ref.current && ref.current.click()}} style={{border:"2px dashed #475569",borderRadius:12,padding:"30px 20px",textAlign:"center",cursor:"pointer",background:"rgba(15,23,42,0.4)",marginBottom:16}}>
      <input ref={ref} type="file" accept=".pdf" onChange={function(e){handleFile(e.target.files[0])}} style={{display:"none"}} />
      {uploading ? <div><div style={{width:30,height:30,border:"3px solid #334155",borderTop:"3px solid #F59E0B",borderRadius:"50%",margin:"0 auto 8px",animation:"sp 1s linear infinite"}} /><div style={{fontSize:11,color:"#F59E0B"}}>Upload en cours…</div></div>
      : <div><div style={{fontSize:32,marginBottom:6}}>📄</div><div style={{fontWeight:600,marginBottom:3,fontSize:12}}>Glissez un OR au format PDF</div><div style={{fontSize:10,color:"#94A3B8"}}>ou cliquez pour parcourir</div></div>}
    </div>
    {current && <div style={{...S.c,padding:"16px",animation:"fi .2s"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:28}}>📄</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:600,fontSize:12}}>{current.name}</div>
          <div style={{fontSize:10,color:"#94A3B8"}}>{current.size ? Math.round(current.size/1024)+"Ko" : ""} — {current.date ? new Date(current.date).toLocaleString("fr-FR") : ""}</div>
        </div>
        <button onClick={function(){window.open(current.url||current.data,"_blank")}} style={S.b}>👁 Voir</button>
        <button onClick={function(){var a=document.createElement("a");a.href=current.url||current.data;a.download=current.name||"OR.pdf";a.target="_blank";a.click()}} style={S.b}>⬇</button>
        <button onClick={deleteUploadedOR} style={{padding:"8px 12px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.15)",borderRadius:8,color:"#FCA5A5",fontSize:11,cursor:"pointer"}}>🗑</button>
      </div>
    </div>}
    {!current && !hasGenerated && <div style={{...S.c,padding:"20px",textAlign:"center"}}><p style={{color:"#64748B",fontSize:11}}>Aucun ordre de réparation — générez-le depuis l'onglet Rapport IA</p></div>}
  </div>;
}

/* === PRISE EN CHARGE === */
function PECTab({d, up}) {
  const ref = useRef(null);
  const [uploading, setUploading] = useState(false);

  var handleFile = async function(f) {
    if(!f) return;
    setUploading(true);
    try {
      var spath = "dossiers/"+d.id+"/pec/"+uid()+"_"+f.name;
      var uploaded = await uploadToStorage(spath, f);
      if(d.pec && d.pec.storagePath) await deleteFromStorage(d.pec.storagePath);
      up(d.id, {pec: {name:f.name, size:f.size, date:new Date().toISOString(), url:uploaded.url, storagePath:uploaded.storagePath, type:f.type}});
    } catch(e) { alert("Erreur upload: "+e.message); }
    setUploading(false);
  };

  var current = d.pec || null;

  var viewPec = function() {
    if(!current) return;
    window.open(current.url||current.data, "_blank");
  };

  var printPec = function() {
    if(!current) return;
    var src = current.url||current.data;
    var w = window.open("","","width=900,height=700");
    if(current.type && current.type.includes("pdf")) {
      w.document.write('<iframe src="'+src+'" style="width:100%;height:100%;border:none"></iframe>');
    } else {
      w.document.write('<img src="'+src+'" style="max-width:100%;height:auto">');
    }
    w.document.close();
    w.focus();
    setTimeout(function(){w.print()},500);
  };

  var deletePec = async function() {
    if(!confirm("Supprimer la prise en charge ?")) return;
    if(current && current.storagePath) await deleteFromStorage(current.storagePath);
    up(d.id, {pec: null});
  };

  return <div>
    <h3 style={{fontSize:14,fontWeight:600,marginBottom:14}}>📝 Prise en charge</h3>
    {current && <div style={{...S.c,padding:"16px",marginBottom:14,border:"1px solid rgba(16,185,129,0.3)",animation:"fi .2s"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:28}}>📝</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:600,fontSize:12}}>{current.name}</div>
          <div style={{fontSize:10,color:"#94A3B8"}}>{current.size?Math.round(current.size/1024)+"Ko":""} — {current.date?new Date(current.date).toLocaleString("fr-FR"):""}</div>
        </div>
        <button onClick={viewPec} style={S.b}>👁 Voir</button>
        <button onClick={printPec} style={{...S.b,background:"linear-gradient(135deg,#10B981,#059669)",color:"#FFF"}}>🖨 Imprimer</button>
        <button onClick={function(){var a=document.createElement("a");a.href=current.url||current.data;a.download=current.name;a.target="_blank";a.click()}} style={S.b}>⬇</button>
        <button onClick={deletePec} style={{padding:"8px 10px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.15)",borderRadius:8,color:"#FCA5A5",fontSize:11,cursor:"pointer"}}>🗑</button>
      </div>
    </div>}
    <div onDragOver={function(e){e.preventDefault()}} onDrop={function(e){e.preventDefault();handleFile(e.dataTransfer.files[0])}} onClick={function(){ref.current&&ref.current.click()}} style={{border:"2px dashed #475569",borderRadius:12,padding:"35px 20px",textAlign:"center",cursor:"pointer",background:"rgba(15,23,42,0.4)"}}>

/* === CONTRAT VEHICULE DE PRET === */
function PretTab({d, up}) {
  const ref = useRef(null);
  const [uploading, setUploading] = useState(false);
  const [docs, setLocalDocs] = useState(d.pretDocs || []);

  useEffect(function(){setLocalDocs(d.pretDocs || [])}, [d.pretDocs]);

  var handleFile = async function(f) {
    if(!f) return;
    setUploading(true);
    try {
      var fid = uid();
      var spath = "dossiers/"+d.id+"/pret/"+fid+"_"+f.name;
      var uploaded = await uploadToStorage(spath, f);
      var newDoc = {id:fid, name:f.name, size:f.size, date:new Date().toISOString(), url:uploaded.url, storagePath:uploaded.storagePath, type:f.type};
      var nd = [...docs, newDoc];
      setLocalDocs(nd);
      up(d.id, {pretDocs: nd});
    } catch(e) { alert("Erreur upload: "+e.message); }
    setUploading(false);
  };

  var viewDoc = function(doc) {
    window.open(doc.url||doc.data, "_blank");
  };

  var printDoc = function(doc) {
    var src = doc.url||doc.data;
    var w = window.open("","","width=900,height=700");
    if(doc.type && doc.type.includes("pdf")) {
      w.document.write('<iframe src="'+src+'" style="width:100%;height:100%;border:none"></iframe>');
    } else {
      w.document.write('<img src="'+src+'" style="max-width:100%;height:auto">');
    }
    w.document.close();
    w.focus();
    setTimeout(function(){w.print()},500);
  };

  var deleteDoc = async function(docId) {
    if(!confirm("Supprimer ce document ?")) return;
    var docToDelete = docs.find(function(x){return x.id===docId});
    if(docToDelete && docToDelete.storagePath) await deleteFromStorage(docToDelete.storagePath);
    var nr = docs.filter(function(x){return x.id !== docId});
    setLocalDocs(nr);
    up(d.id, {pretDocs: nr});
  };

  return <div>
    <h3 style={{fontSize:14,fontWeight:600,marginBottom:14}}>🚗 Contrat véhicule de prêt</h3>
    {docs.length>0 && <div style={{marginBottom:14}}>
      {docs.map(function(doc,i){
        return <div key={doc.id||i} style={{...S.c,padding:"14px",marginBottom:6,border:"1px solid rgba(59,130,246,0.2)",animation:"fi .2s"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:24}}>{doc.type&&doc.type.includes("pdf")?"📄":"🖼"}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:11}}>{doc.name}</div>
              <div style={{fontSize:9,color:"#94A3B8"}}>{doc.size?Math.round(doc.size/1024)+"Ko":""} — {doc.date?new Date(doc.date).toLocaleString("fr-FR"):""}</div>
            </div>
            <button onClick={function(){viewDoc(doc)}} style={S.b}>👁 Voir</button>
            <button onClick={function(){printDoc(doc)}} style={{...S.b,background:"linear-gradient(135deg,#3B82F6,#2563EB)",color:"#FFF"}}>🖨</button>
            <button onClick={function(){var a=document.createElement("a");a.href=doc.url||doc.data;a.download=doc.name;a.target="_blank";a.click()}} style={S.b}>⬇</button>
            <span onClick={function(){deleteDoc(doc.id)}} style={{color:"#EF4444",cursor:"pointer",fontSize:12}}>✕</span>
          </div>
        </div>;
      })}
    </div>}
    <div onDragOver={function(e){e.preventDefault()}} onDrop={function(e){e.preventDefault();Array.from(e.dataTransfer.files).forEach(function(f){handleFile(f)})}} onClick={function(){ref.current&&ref.current.click()}} style={{border:"2px dashed #475569",borderRadius:12,padding:"35px 20px",textAlign:"center",cursor:"pointer",background:"rgba(15,23,42,0.4)"}}>
      <input ref={ref} type="file" accept=".pdf,.jpg,.jpeg,.png" multiple onChange={function(e){Array.from(e.target.files).forEach(function(f){handleFile(f)});e.target.value=""}} style={{display:"none"}} />
      {uploading ? <div><div style={{width:30,height:30,border:"3px solid #334155",borderTop:"3px solid #3B82F6",borderRadius:"50%",margin:"0 auto 8px",animation:"sp 1s linear infinite"}} /><div style={{fontSize:11,color:"#3B82F6"}}>Upload en cours…</div></div>
      : <div><div style={{fontSize:36,marginBottom:6}}>🚗</div><div style={{fontWeight:600,marginBottom:3,fontSize:12}}>Ajouter un document</div><div style={{fontSize:10,color:"#94A3B8"}}>Contrat de prêt, état des lieux… (PDF, JPG, PNG)</div></div>}
    </div>
    {!docs.length && <div style={{...S.c,padding:"18px",textAlign:"center",marginTop:12}}><p style={{color:"#64748B",fontSize:11}}>Aucun document de prêt déposé</p></div>}
  </div>;
}

const ALL_ASS = ["MAAF","MMA","GMF","AXA","Allianz","Macif","MAIF","Groupama","Matmut","Generali","Direct Assurance","Pacifica","BPCE","Covéa","Axa Courtage","Thélem Assurances","Aviva","Zurich","GAN","AGPM","SMACL","MACSF","Ethias","SwissLife","Crédit Mutuel","SMA","L'Olivier","Abeille Assurances","La Parisienne","Wafa Assurance","Autre"];

  // Charger contacts Firebase
  useEffect(function() {
    var unsub1 = db.collection("contacts").onSnapshot(function(snap) {
      var all = snap.docs.map(function(doc){return {id:doc.id,...doc.data()}});
      setAssureurs(all.filter(function(c){return c.type==="assureur"}));
      setExperts(all.filter(function(c){return c.type==="expert"}));

            db.collection("contacts").doc(id).set({id:id, type:"assureur", nom:nom, email:"", tel:"", adresse:""});

      }
      setLoaded(true);

    {/* LISTE CABINETS EXPERTISE */}

/* === AGENDA === */
function AgendaPage({dos, onOpen, curUser}) {
  const [cur, setCur] = useState(new Date());
  const [rdvs, setRdvs] = useState([]);
  const [showAdd, setShowAdd] = useState(null); // null or date string
  const [nrdv, setNrdv] = useState({titre:"",heure:"09:00",type:"rdv",note:""});
  const y = cur.getFullYear(), m = cur.getMonth();
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const today = new Date();
  const isToday = (d) => today.getFullYear()===y && today.getMonth()===m && today.getDate()===d;
  const MOIS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  const JOURS = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
  const RDV_TYPES = [
    {id:"rdv",l:"🗓 RDV Client",c:"#A855F7"},
    {id:"expertise_rdv",l:"🔍 Expertise",c:"#F59E0B"},
    {id:"livraison_rdv",l:"🚗 Livraison",c:"#10B981"},
    {id:"rappel",l:"📞 Rappel",c:"#06B6D4"},
    {id:"autre",l:"📌 Autre",c:"#F97316"}
  ];

  // Charger RDVs depuis Firebase
  useEffect(() => {
    const unsub = db.collection("rdvs").onSnapshot(snap => {
      setRdvs(snap.docs.map(d => ({id:d.id, ...d.data()})));
    }, function(err){ console.error(err); });
    return function(){ unsub(); };
  }, []);

  // Ajouter un RDV
  const addRdv = () => {
    if (!nrdv.titre || !showAdd) return;
    const r = {id:uid(), date:showAdd, titre:nrdv.titre, heure:nrdv.heure, type:nrdv.type, note:nrdv.note, creePar:curUser.nom, creeAt:new Date().toISOString()};
    db.collection("rdvs").doc(r.id).set(r);
    setNrdv({titre:"",heure:"09:00",type:"rdv",note:""});
    setShowAdd(null);
  };
  const delRdv = (id) => { if(confirm("Supprimer ce RDV?")) db.collection("rdvs").doc(id).delete(); };

  // Events par jour (dossiers + rdvs)
  const events = (day) => {
    const ds = String(y)+"-"+String(m+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
    const evts = [];
    dos.forEach(d => {
      if (d.dt === ds) evts.push({type:"dossier",label:"📁 "+d.cli,color:"#3B82F6",d:d,isRdv:false});
      if (d.liv === ds) evts.push({type:"livraison",label:"🚗 "+d.cli,color:"#10B981",d:d,isRdv:false});
    });
    rdvs.filter(r => r.date === ds).sort(function(a,b){return (a.heure||"").localeCompare(b.heure||"")}).forEach(r => {
      const tp = RDV_TYPES.find(t => t.id === r.type) || RDV_TYPES[0];
      evts.push({type:"rdv",label:(r.heure?r.heure+" ":"")+r.titre,color:tp.c,rdv:r,isRdv:true});
    });
    return evts;
  };

  const cells = [];
  for (let i=0; i<offset; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);

  return <div style={{animation:"fi .3s"}}>
    <h1 style={{fontSize:22,fontWeight:700,marginBottom:14}}>Agenda</h1>
    <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:18}}>
      <button onClick={() => setCur(new Date(y,m-1,1))} style={S.bg}>◀</button>
      <h2 style={{fontSize:16,fontWeight:600,minWidth:200,textAlign:"center"}}>{MOIS[m]} {y}</h2>
      <button onClick={() => setCur(new Date(y,m+1,1))} style={S.bg}>▶</button>
      <button onClick={() => setCur(new Date())} style={{...S.b,marginLeft:"auto",fontSize:10,padding:"6px 14px"}}>Aujourd'hui</button>
    </div>
    <div style={{display:"flex",gap:12,marginBottom:14,flexWrap:"wrap"}}>
      {[["📁 Réception","#3B82F6"],["🚗 Livraison","#10B981"],["🗓 RDV","#A855F7"],["📞 Rappel","#06B6D4"],["📌 Autre","#F97316"]].map(([l,c],i) =>
        <div key={i} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:10,height:10,borderRadius:3,background:c}}/><span style={{fontSize:10,color:"#94A3B8"}}>{l}</span></div>
      )}
    </div>
    <div style={{...S.c,overflow:"hidden"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
        {JOURS.map(j => <div key={j} style={{padding:"8px",textAlign:"center",fontSize:10,fontWeight:600,color:"#94A3B8",borderBottom:"2px solid #334155",background:"#0F172A"}}>{j}</div>)}
        {cells.map((day, i) => {
          const evts = day ? events(day) : [];
          const ds = day ? String(y)+"-"+String(m+1).padStart(2,"0")+"-"+String(day).padStart(2,"0") : "";
          return <div key={i} onClick={() => {if(day)setShowAdd(ds)}} style={{minHeight:80,padding:"4px",borderBottom:"1px solid #33415530",borderRight:"1px solid #33415530",background:day && isToday(day)?"rgba(245,158,11,0.06)":"transparent",cursor:day?"pointer":"default"}}>
            {day && <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3,paddingRight:2}}>
                <span style={{fontSize:8,color:"#475569",cursor:"pointer"}} onClick={(e) => {e.stopPropagation();setShowAdd(ds)}}>+</span>
                <span style={{fontSize:11,fontWeight:isToday(day)?700:400,color:isToday(day)?"#F59E0B":"#94A3B8"}}>{day}</span>
              </div>
              {evts.map((e,j) => <div key={j} onClick={(ev) => {ev.stopPropagation();if(e.isRdv){}else if(e.d)onOpen(e.d)}} style={{fontSize:8,padding:"2px 4px",marginBottom:2,borderRadius:4,background:e.color+"15",color:e.color,fontWeight:600,cursor:e.isRdv?"default":"pointer",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",border:"1px solid "+e.color+"30",position:"relative"}}>
                {e.label}
                {e.isRdv && <span onClick={(ev) => {ev.stopPropagation();delRdv(e.rdv.id)}} style={{position:"absolute",right:2,top:0,fontSize:8,cursor:"pointer",color:"#EF4444",opacity:0.6}}>✕</span>}
              </div>)}
            </div>}
          </div>;
        })}
      </div>
    </div>

    {/* FORMULAIRE AJOUT RDV */}
    {showAdd && <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:12}} onClick={() => setShowAdd(null)}>
      <div onClick={(e) => e.stopPropagation()} style={{background:"#1E293B",borderRadius:13,padding:"22px",width:"100%",maxWidth:420,border:"1px solid #334155",animation:"fi .2s"}}>
        <h2 style={{fontSize:16,fontWeight:700,marginBottom:4}}>📅 Nouveau RDV</h2>
        <p style={{fontSize:11,color:"#94A3B8",marginBottom:14}}>{showAdd.split("-").reverse().join("/")}</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:9}}>
          <div style={{gridColumn:"1/-1"}}><label style={S.l}>Titre *</label><input style={S.i} value={nrdv.titre} onChange={(e) => setNrdv({...nrdv,titre:e.target.value})} placeholder="Ex: RDV M. Dupont, Expertise Clio…" onKeyDown={(e) => e.key==="Enter" && addRdv()} /></div>
          <div><label style={S.l}>Heure</label><input type="time" style={S.i} value={nrdv.heure} onChange={(e) => setNrdv({...nrdv,heure:e.target.value})} /></div>
          <div><label style={S.l}>Type</label><select style={S.i} value={nrdv.type} onChange={(e) => setNrdv({...nrdv,type:e.target.value})}>{RDV_TYPES.map(t => <option key={t.id} value={t.id}>{t.l}</option>)}</select></div>
        </div>
        <div style={{marginBottom:12}}><label style={S.l}>Note</label><textarea rows={2} style={{...S.i,resize:"vertical"}} value={nrdv.note} onChange={(e) => setNrdv({...nrdv,note:e.target.value})} placeholder="Détails…" /></div>
        <div style={{display:"flex",gap:7,justifyContent:"flex-end"}}>
          <button onClick={() => setShowAdd(null)} style={S.bg}>Annuler</button>
          <button onClick={addRdv} style={S.b}>✓ Ajouter</button>
        </div>
      </div>
    </div>}

    {/* LISTE EVENTS DU MOIS */}
    {(() => {
      const monthEvts = [];
      for(var d=1;d<=daysInMonth;d++){events(d).forEach(function(e){monthEvts.push({...e,day:d})})}
      if(!monthEvts.length) return null;
      return <div style={{marginTop:16,...S.c,padding:"14px"}}>
        <h3 style={{fontSize:12,fontWeight:600,marginBottom:10}}>📋 Ce mois : {monthEvts.length} événements</h3>
        {monthEvts.map((e,i) => <div key={i} onClick={() => {if(!e.isRdv && e.d)onOpen(e.d)}} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",cursor:e.isRdv?"default":"pointer",borderRadius:6,marginBottom:2,background:"#0F172A"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#F59E0B",fontFamily:"monospace",minWidth:28}}>{e.day}/{m+1}</div>
          <div style={{width:8,height:8,borderRadius:2,background:e.color,flexShrink:0}}/>
          <div style={{fontSize:11,fontWeight:500,flex:1}}>{e.label}</div>
          {e.isRdv && e.rdv.note && <div style={{fontSize:9,color:"#64748B"}}>{e.rdv.note.slice(0,30)}</div>}
          {e.isRdv && <span onClick={(ev) => {ev.stopPropagation();delRdv(e.rdv.id)}} style={{fontSize:10,cursor:"pointer",color:"#EF4444",opacity:0.5}}>🗑</span>}
          {!e.isRdv && e.d && <div style={{fontSize:9,color:"#64748B"}}>{e.d.veh} {e.d.imm}</div>}
        </div>)}
      </div>;
    })()}
  </div>;
}

/* === COURBE CHIFFRE D'AFFAIRES === */
function ChartPage({dos}) {
  const [period, setPeriod] = useState("mois");

  // Calcul données par mois (12 derniers mois)
  const now = new Date();
  const MOIS_COURT = ["Jan","Fév","Mar","Avr","Mai","Juin","Juil","Aoû","Sep","Oct","Nov","Déc"];

  const monthData = [];
  for (let i=11; i>=0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const key = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    const dossiers = dos.filter(x => x.dt && x.dt.startsWith(key));
    const ca = dossiers.reduce((s,x) => s+(+x.mt||0), 0);
    const nb = dossiers.length;
    const pieces = dossiers.reduce((s,x) => s+tot(x.pcs), 0);
    monthData.push({label:MOIS_COURT[d.getMonth()]+" "+d.getFullYear(), ca, nb, pieces, marge:ca-pieces});
  }

  const maxCA = Math.max(...monthData.map(d => d.ca), 1);
  const totalCA = monthData.reduce((s,d) => s+d.ca, 0);
  const totalDos = monthData.reduce((s,d) => s+d.nb, 0);
  const totalMarge = monthData.reduce((s,d) => s+d.marge, 0);
  const avgCA = Math.round(totalCA / 12);

  // SVG chart dimensions
  const W = 800, H = 300, PAD = 50, PB = 30;
  const chartW = W - PAD*2, chartH = H - PAD - PB;

  const points = monthData.map((d, i) => ({
    x: PAD + (i / (monthData.length-1)) * chartW,
    y: PAD + chartH - (d.ca / maxCA) * chartH,
    ...d
  }));
  const margePoints = monthData.map((d, i) => ({
    x: PAD + (i / (monthData.length-1)) * chartW,
    y: PAD + chartH - (Math.max(d.marge,0) / maxCA) * chartH,
    ...d
  }));

  const line = points.map((p,i) => (i===0?"M":"L")+p.x+","+p.y).join(" ");
  const area = line + " L"+points[points.length-1].x+","+(PAD+chartH)+" L"+points[0].x+","+(PAD+chartH)+" Z";
  const margeLine = margePoints.map((p,i) => (i===0?"M":"L")+p.x+","+p.y).join(" ");

  return <div style={{animation:"fi .3s"}}>
    <h1 style={{fontSize:22,fontWeight:700,marginBottom:3}}>Chiffre d'affaires</h1>
    <p style={{color:"#94A3B8",fontSize:11,marginBottom:18}}>Évolution sur 12 mois</p>

    {/* KPI */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10,marginBottom:20}}>
      {[["📈","CA total",totalCA.toLocaleString("fr-FR")+"€","#F59E0B"],["📁","Dossiers",totalDos,"#3B82F6"],["💰","Marge totale",totalMarge.toLocaleString("fr-FR")+"€","#10B981"],["📊","CA moyen/mois",avgCA.toLocaleString("fr-FR")+"€","#8B5CF6"]].map(([ic,l,v,c],i) =>
        <div key={i} style={{...S.c,padding:"14px"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:9,color:"#94A3B8",fontWeight:600,textTransform:"uppercase"}}>{l}</span><span style={{fontSize:14}}>{ic}</span></div><div style={{fontSize:20,fontWeight:700,color:c,fontFamily:"monospace"}}>{v}</div></div>
      )}
    </div>

    {/* GRAPHIQUE */}
    <div style={{...S.c,padding:"20px",marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h3 style={{fontSize:13,fontWeight:600}}>Évolution CA & Marge</h3>
        <div style={{display:"flex",gap:12}}>
          {[["—","CA","#F59E0B"],["—","Marge","#10B981"]].map(([s,l,c],i) =>
            <div key={i} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:16,height:3,background:c,borderRadius:2}}/><span style={{fontSize:9,color:"#94A3B8"}}>{l}</span></div>
          )}
        </div>
      </div>
      <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto"}}>
        {/* Grid lines */}
        {[0,0.25,0.5,0.75,1].map((r,i) => {
          const y = PAD + chartH - r * chartH;
          return <g key={i}><line x1={PAD} y1={y} x2={PAD+chartW} y2={y} stroke="#334155" strokeWidth="1" strokeDasharray={r===0?"":"4,4"}/><text x={PAD-8} y={y+4} textAnchor="end" fill="#64748B" fontSize="9" fontFamily="monospace">{Math.round(maxCA*r).toLocaleString("fr-FR")}</text></g>;
        })}
        {/* Area fill */}
        <path d={area} fill="url(#caGrad)" opacity="0.15"/>
        <defs><linearGradient id="caGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#F59E0B"/><stop offset="100%" stopColor="#F59E0B" stopOpacity="0"/></linearGradient></defs>
        {/* CA line */}
        <path d={line} fill="none" stroke="#F59E0B" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {/* Marge line */}
        <path d={margeLine} fill="none" stroke="#10B981" strokeWidth="2" strokeDasharray="6,3" strokeLinecap="round" strokeLinejoin="round"/>
        {/* Points + labels */}
        {points.map((p,i) => <g key={i}>
          <circle cx={p.x} cy={p.y} r={4} fill="#F59E0B" stroke="#1E293B" strokeWidth="2"/>
          {p.ca > 0 && <text x={p.x} y={p.y-12} textAnchor="middle" fill="#F59E0B" fontSize="9" fontWeight="600" fontFamily="monospace">{p.ca.toLocaleString("fr-FR")}</text>}
          <text x={p.x} y={PAD+chartH+16} textAnchor="middle" fill="#94A3B8" fontSize="8">{p.label.split(" ")[0]}</text>
        </g>)}
        {margePoints.map((p,i) => <g key={i}><circle cx={p.x} cy={p.y} r={3} fill="#10B981" stroke="#1E293B" strokeWidth="2"/></g>)}
      </svg>
    </div>

    {/* TABLEAU MENSUEL */}
    <div style={{...S.c,overflow:"hidden"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
        <thead><tr style={{borderBottom:"2px solid #334155"}}>{["Mois","Dossiers","CA HT","Pièces&MO","Marge","% Marge"].map(h => <th key={h} style={{padding:"9px 10px",textAlign:"left",color:"#94A3B8",fontSize:9,textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
        <tbody>{[...monthData].reverse().map((d,i) => <tr key={i} style={{borderBottom:"1px solid #33415530",background:i%2?"#172033":"#1E293B"}}>
          <td style={{padding:"7px 10px",fontWeight:600}}>{d.label}</td>
          <td style={{padding:"7px 10px",fontFamily:"monospace",color:"#3B82F6"}}>{d.nb}</td>
          <td style={{padding:"7px 10px",fontFamily:"monospace",fontWeight:600,color:"#F59E0B"}}>{d.ca.toLocaleString("fr-FR")}€</td>
          <td style={{padding:"7px 10px",fontFamily:"monospace",color:"#F97316"}}>{d.pieces.toLocaleString("fr-FR")}€</td>
          <td style={{padding:"7px 10px",fontFamily:"monospace",fontWeight:600,color:d.marge>=0?"#10B981":"#EF4444"}}>{d.marge.toLocaleString("fr-FR")}€</td>
          <td style={{padding:"7px 10px",fontFamily:"monospace",color:d.ca>0?"#8B5CF6":"#475569"}}>{d.ca>0?Math.round((d.marge/d.ca)*100)+"%":"—"}</td>
        </tr>)}</tbody>
      </table>
    </div>
  </div>;
}

/* === FORM MODAL === */

        <div><label style={S.l}>Date</label><input type="date" style={S.i} value={f.dt} onChange={e=>sF({...f,dt:e.target.value})} /></div>
        <div><label style={S.l}>Client</label><input style={S.i} value={f.cli} onChange={e=>sF({...f,cli:e.target.value})} placeholder="Nom" /></div>
        <div><label style={S.l}>Tél</label><input style={S.i} value={f.tel} onChange={e=>sF({...f,tel:e.target.value})} placeholder="06…" /></div>
        <div style={{gridColumn:"1/-1"}}><label style={S.l}>Email client</label><input type="email" style={S.i} value={f.email} onChange={e=>sF({...f,email:e.target.value})} placeholder="client@email.com" /></div>
        <div><label style={S.l}>Véhicule</label><input style={S.i} value={f.veh} onChange={e=>sF({...f,veh:e.target.value})} placeholder="Marque Modèle" /></div>
        <div><label style={S.l}>Immat</label><input style={S.i} value={f.imm} onChange={e=>sF({...f,imm:e.target.value})} placeholder="AA-123-BB" /></div>
        <div><label style={S.l}>Assureur</label><select style={S.i} value={f.ass} onChange={e=>sF({...f,ass:e.target.value})}><option value="">—</option>{ASS.map(a=><option key={a}>{a}</option>)}</select></div>
        <div><label style={S.l}>Statut</label><select style={S.i} value={f.sta} onChange={e=>sF({...f,sta:e.target.value})}>{ST.map(x=><option key={x.id} value={x.id}>{x.l}</option>)}</select></div>
        <div><label style={S.l}>Expert</label><input style={S.i} value={f.exp} onChange={e=>sF({...f,exp:e.target.value})} placeholder="Cabinet — Nom" /></div>
        <div><label style={S.l}>Franchise €</label><input type="number" style={S.i} value={f.fr} onChange={e=>sF({...f,fr:e.target.value})} /></div>
        <div><label style={S.l}>Montant HT €</label><input type="number" style={S.i} value={f.mt} onChange={e=>sF({...f,mt:e.target.value})} /></div>
        <div><label style={S.l}>Livraison</label><input type="date" style={S.i} value={f.liv} onChange={e=>sF({...f,liv:e.target.value})} /></div>
      </div>
      <div style={{marginTop:8}}><label style={S.l}>Remarques</label><textarea rows={2} style={{...S.i,resize:"vertical"}} value={f.rem} onChange={e=>sF({...f,rem:e.target.value})} /></div>
      <div style={{display:"flex",gap:7,marginTop:14,justifyContent:"flex-end"}}>
        <button onClick={cls} style={S.bg}>Annuler</button>
        <button onClick={() => sav(f)} style={S.b}>{ed?"Enregistrer":"Créer"}</button>
      </div>
    </div>
  </div>;
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
