    html += '<div style="margin-top:30px;display:grid;grid-template-columns:1fr 1fr;gap:30px"><div style="border-top:1px solid #999;padding-top:8px">Signature de l\'entreprise</div><div style="border-top:1px solid #999;padding-top:8px">Signature du client</div></div>';
    html += '</body></html>';

    var w = window.open("","","width=800,height=1000");
    w.document.write(html);
    w.document.close();
    w.focus();
    setTimeout(function(){w.print()},400);

    // Sauvegarder l'OR dans le dossier
    up(d.id, {orHtml: html, orDate: new Date().toISOString()});
    botMsg("general", "🤖 OR généré automatiquement pour "+(d.cli||"")+" — "+(d.imm||""));
  };

  return <div>
    {/* Rapports sauvegardés */}
    {(d.rapports||[]).length>0 && <div style={{...S.c,padding:"14px",marginBottom:14}}>
      <h4 style={{fontSize:11,fontWeight:600,marginBottom:8,color:"#F59E0B"}}>📂 Rapports d'expertise sauvegardés ({(d.rapports||[]).length})</h4>
      {(d.rapports||[]).map(function(r,i){
        return <div key={r.id||i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",marginBottom:4,background:"#0F172A",borderRadius:7,border:"1px solid #334155"}}>
          <span style={{fontSize:20}}>📄</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:11}}>{r.name}</div>
            <div style={{fontSize:9,color:"#94A3B8"}}>{r.size?Math.round(r.size/1024)+"Ko":""} — {r.date?new Date(r.date).toLocaleString("fr-FR"):""}</div>
          </div>
          <button onClick={function(){var a=document.createElement("a");a.href=r.url||r.data;a.download=r.name||"rapport.pdf";a.target="_blank";a.click()}} style={S.b}>⬇ Télécharger</button>
          <button onClick={function(){window.open(r.url||r.data,"_blank")}} style={{...S.b,padding:"6px 10px"}}>👁</button>
          <span onClick={function(){if(confirm("Supprimer ce rapport ?")){if(r.storagePath)deleteFromStorage(r.storagePath);var nr=(d.rapports||[]).filter(function(x){return x.id!==r.id});up(d.id,{rapports:nr})}}} style={{color:"#EF4444",cursor:"pointer",fontSize:12}}>✕</span>
        </div>;
      })}
    </div>}

    <div onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();proc(e.dataTransfer.files[0])}} onClick={()=>ref.current&&ref.current.click()} style={{border:"2px dashed #475569",borderRadius:12,padding:"40px 20px",textAlign:"center",cursor:"pointer",background:"rgba(15,23,42,0.4)",marginBottom:16}}>
      <input ref={ref} type="file" accept=".pdf" onChange={e=>proc(e.target.files[0])} style={{display:"none"}} />
      {ld ? <div><div style={{width:40,height:40,border:"3px solid #334155",borderTop:"3px solid #F59E0B",borderRadius:"50%",margin:"0 auto 12px",animation:"sp 1s linear infinite"}} /><div style={{fontWeight:600,color:"#F59E0B"}}>🤖 Analyse en cours…</div><div style={{fontSize:10,color:"#94A3B8",marginTop:4}}>Extraction des informations client, pièces, chiffrage…</div></div>
      : <div><div style={{fontSize:40,marginBottom:8}}>📄</div><div style={{fontWeight:600,marginBottom:3}}>Glissez le PDF d'expertise</div><div style={{fontSize:11,color:"#94A3B8"}}>Audatex, GT Motive, Alpha Scale — Extraction automatique</div></div>}
    </div>
    <div style={{marginBottom:14}}>
      <div onClick={() => setShowKey(!showKey)} style={{cursor:"pointer",marginBottom:showKey?8:0}}>
        <span style={{fontSize:10,color:apiKey?"#10B981":"#F59E0B",fontWeight:600}}>{apiKey?"🔑 Clé configurée":"⚙️ Configurer clé API"}</span>
        <span style={{fontSize:9,color:"#64748B",marginLeft:4}}>{showKey?"▲":"▼"}</span>
      </div>
      {showKey && <div style={{background:"#0F172A",borderRadius:8,padding:"12px",border:"1px solid #334155"}}>
        <label style={S.l}>Clé API Anthropic (sk-ant-…)</label>
        <div style={{display:"flex",gap:6}}>
          <input type="password" value={apiKey} onChange={e=>saveKey(e.target.value)} placeholder="sk-ant-api03-..." style={{...S.i,flex:1,fontFamily:"monospace",fontSize:11}} />
          {apiKey && <button onClick={()=>saveKey("")} style={{padding:"6px 12px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:6,color:"#FCA5A5",fontSize:10,cursor:"pointer"}}>✕</button>}
        </div>
        <p style={{fontSize:9,color:"#64748B",marginTop:6}}>Clé partagée entre tous les postes — console.anthropic.com</p>
      </div>}
    </div>
    {er && <div style={{background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:8,padding:"10px 14px",color:"#FCA5A5",fontSize:11,marginBottom:12}}>❌ {er}</div>}
    {rs && <div style={{...S.c,padding:"18px",animation:"fi .3s"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <h3 style={{fontWeight:700}}>🤖 Résultat de l'analyse</h3>
        <div style={{display:"flex",gap:6}}>
          <button onClick={generateOR} style={{padding:"8px 14px",background:"linear-gradient(135deg,#8B5CF6,#7C3AED)",color:"#FFF",border:"none",borderRadius:7,fontWeight:600,fontSize:11,cursor:"pointer"}}>📄 Générer OR</button>
          <button onClick={apply} disabled={ap} style={{...S.b,background:ap?"#10B981":"linear-gradient(135deg,#F59E0B,#D97706)",color:ap?"#FFF":"#0F172A"}}>{ap?"✓ Appliqué":"Appliquer au dossier"}</button>
        </div>
      </div>
      {/* INFOS CLIENT + VEHICULE */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <div style={{background:"#0F172A",borderRadius:8,padding:"10px",border:"1px solid #334155"}}>
          <div style={{fontSize:9,color:"#F59E0B",fontWeight:700,marginBottom:6}}>👤 CLIENT</div>
          <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>{rs.client||"—"}</div>
          {rs.adresseClient && <div style={{fontSize:10,color:"#94A3B8"}}>{rs.adresseClient}</div>}
          {rs.telClient && <div style={{fontSize:10,color:"#06B6D4"}}>📞 {rs.telClient}</div>}
        </div>
        <div style={{background:"#0F172A",borderRadius:8,padding:"10px",border:"1px solid #334155"}}>
          <div style={{fontSize:9,color:"#F59E0B",fontWeight:700,marginBottom:6}}>🚗 VÉHICULE</div>
          <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>{rs.vehicule||"—"}</div>
          <div style={{fontSize:11,fontFamily:"monospace",color:"#F8FAFC"}}>{rs.immat||"—"}</div>
          {rs.numSerie && <div style={{fontSize:9,color:"#64748B"}}>N° série: {rs.numSerie}</div>}
          <div style={{fontSize:10,color:"#3B82F6",marginTop:4}}>🏢 {rs.assureur||"—"}</div>
          <div style={{fontSize:10,color:"#F59E0B"}}>🔍 Cabinet: {rs.cabinetExpertise||"—"}</div>
          <div style={{fontSize:10,color:"#94A3B8"}}>👤 Expert: {rs.expert||"—"}</div>
          {rs.numSinistre && <div style={{fontSize:10,color:"#64748B"}}>N° sinistre: {rs.numSinistre}</div>}
          {rs.numRapport && <div style={{fontSize:10,color:"#64748B"}}>N° rapport: {rs.numRapport}</div>}
          {rs.pointChoc && <div style={{fontSize:10,color:"#EF4444"}}>💥 {rs.pointChoc} — {rs.intensite||""}</div>}
        </div>
      </div>
      {/* PIECES */}
      {(rs.pieces||[]).length > 0 && <div style={{marginBottom:10}}>
        <div style={{fontSize:10,fontWeight:700,color:"#F97316",marginBottom:4}}>🔩 PIÈCES</div>
        {(rs.pieces||[]).map((p,i) => <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 8px",background:"#0F172A",marginBottom:1,borderRadius:3,fontSize:10}}><span>{p.reference?<span style={{color:"#64748B"}}>[{p.reference}] </span>:""}{p.designation} x{p.qte||1}</span><span style={{color:"#F59E0B",fontFamily:"monospace",fontWeight:600}}>{((p.qte||1)*(p.prixUnit||0)).toFixed(2)}€</span></div>)}
      </div>}
      {/* MAIN D'OEUVRE */}
      {(rs.mainOeuvre||[]).length > 0 && <div style={{marginBottom:10}}>
        <div style={{fontSize:10,fontWeight:700,color:"#3B82F6",marginBottom:4}}>🔧 MAIN D'ŒUVRE</div>
        {(rs.mainOeuvre||[]).map((m,i) => <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 8px",background:"#0F172A",marginBottom:1,borderRadius:3,fontSize:10}}><span>{m.designation} — {m.heures||0}h x {(m.tauxHoraire||0)}€/h</span><span style={{color:"#3B82F6",fontFamily:"monospace",fontWeight:600}}>{((m.heures||1)*(m.tauxHoraire||0)).toFixed(2)}€</span></div>)}
      </div>}
      {/* PEINTURE */}
      {(rs.peinture||[]).length > 0 && <div style={{marginBottom:10}}>
        <div style={{fontSize:10,fontWeight:700,color:"#A855F7",marginBottom:4}}>🎨 PEINTURE</div>
        {(rs.peinture||[]).map((p,i) => <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 8px",background:"#0F172A",marginBottom:1,borderRadius:3,fontSize:10}}><span>{p.designation} — {p.heures||0}h x {(p.tauxHoraire||0)}€/h</span><span style={{color:"#A855F7",fontFamily:"monospace",fontWeight:600}}>{((p.heures||1)*(p.tauxHoraire||0)).toFixed(2)}€</span></div>)}
      </div>}
      {/* INGREDIENTS */}
      {(rs.ingredients||[]).length > 0 && <div style={{marginBottom:10}}>
        <div style={{fontSize:10,fontWeight:700,color:"#10B981",marginBottom:4}}>🧪 INGRÉDIENTS</div>
        {(rs.ingredients||[]).map((p,i) => <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 8px",background:"#0F172A",marginBottom:1,borderRadius:3,fontSize:10}}><span>{p.designation} — {p.heures||0}h x {(p.tauxHoraire||0)}€/h</span><span style={{color:"#10B981",fontFamily:"monospace",fontWeight:600}}>{((p.heures||1)*(p.tauxHoraire||0)).toFixed(2)}€</span></div>)}
      </div>}
      {/* REMISE */}
      {rs.remisePieces > 0 && <div style={{background:"rgba(239,68,68,0.05)",borderRadius:6,padding:"6px 10px",marginBottom:10,border:"1px solid rgba(239,68,68,0.15)"}}><span style={{fontSize:10,color:"#EF4444",fontWeight:600}}>📉 Remise pièces: {rs.remisePieces}%</span></div>}
      {/* TOTAUX */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginTop:10}}>
        {[["TOTAL HT",rs.montantTotal,"#F97316"],["TVA 20%",rs.montantTotal?Math.round(rs.montantTotal*0.2*100)/100:null,"#94A3B8"],["TOTAL TTC",rs.montantTTC||( rs.montantTotal?Math.round(rs.montantTotal*1.2*100)/100:null),"#0078D4"],["FRANCHISE",rs.franchise,"#EF4444"]].map(([l,v,c],i) =>
          <div key={i} style={{background:c+"0A",borderRadius:7,padding:"8px",textAlign:"center",border:"1px solid "+c+"20"}}><div style={{fontSize:8,color:"#94A3B8"}}>{l}</div><div style={{fontSize:15,fontWeight:700,color:c,fontFamily:"monospace"}}>{v!=null?v.toFixed?v.toFixed(2)+"€":v+"€":"—"}</div></div>
        )}
      </div>
      {/* OBSERVATIONS */}
      {rs.observations && <div style={{marginTop:10,background:"#0F172A",borderRadius:6,padding:"8px 10px",border:"1px solid #334155"}}><div style={{fontSize:9,color:"#94A3B8",fontWeight:600}}>OBSERVATIONS</div><div style={{fontSize:11}}>{rs.observations}</div></div>}
    </div>}
  </div>;
}

/* === MES TACHES === */
function TodoPage({curUser, users}) {
  var isAdmin = curUser.role === "admin";
  var [todos, setTodos] = useState([]);
  var [viewUser, setViewUser] = useState(curUser.id);
  var [newTask, setNewTask] = useState("");
  var [newDate, setNewDate] = useState("");
  var [newTime, setNewTime] = useState("");
  var [newPrio, setNewPrio] = useState("normal");
  var [showDone, setShowDone] = useState(false);
  var [addFor, setAddFor] = useState("");

  var prenom = curUser.nom.split(" ")[0];
  var TODO_PHRASES = [
    ["🎯","Chaque tâche cochée te rapproche du succès, "+prenom+" !"],
    ["🔥","On lâche rien "+prenom+" ! Une tâche à la fois, tu vas tout déchirer."],
    ["💪","Hey "+prenom+", montre à cette liste qui est le patron !"],
    ["⚡","Plus tu avances, plus tu deviens fort. Go "+prenom+" !"],
    ["🚀","Prêt à conquérir ta journée "+prenom+" ? Let's go !"],
    ["🏆","Chaque case cochée, c'est une petite victoire. Cumule-les "+prenom+" !"],
    ["☕","Un bon café + une bonne liste = une journée productive. À toi "+prenom+" !"],
    ["🌟","Les grands accomplissements commencent par de petites tâches. Force "+prenom+" !"],
    ["👊",""+prenom+", ta to-do list n'a aucune chance face à toi !"],
    ["🎉","Allez "+prenom+", imagine la satisfaction quand tout sera coché !"],
    ["🧠","Organiser, c'est déjà avancer. T'es sur la bonne voie "+prenom+" !"],
    ["🦁","Attaque cette liste comme un lion "+prenom+" ! Rien ne t'arrête."],
    ["💎","La discipline d'aujourd'hui, c'est la liberté de demain. Go "+prenom+" !"],
    ["🌈","Même les journées chargées finissent. Courage "+prenom+" !"],
    ["🏅","Un pro, c'est quelqu'un qui fait ce qu'il faut, même quand c'est dur. Respect "+prenom+" !"]
  ];
  var [todoPhrase] = useState(function(){return TODO_PHRASES[Math.floor(Math.random()*TODO_PHRASES.length)]});

  var emojis = ["🎯","⚡","🔧","📞","📋","🚗","💼","📦","🔍","✏️","📐","🛠","💡","📊","🏁"];
  var prioConfig = {urgent:{label:"🔴 Urgent",color:"#EF4444",bg:"rgba(239,68,68,0.08)"},normal:{label:"🟡 Normal",color:"#F59E0B",bg:"rgba(245,158,11,0.06)"},cool:{label:"🟢 Tranquille",color:"#10B981",bg:"rgba(16,185,129,0.06)"}};

  // Charger tâches
  var [assigned, setAssigned] = useState([]);
  useEffect(function(){
    var unsub = db.collection("todos").where("userId","==",viewUser)
      .onSnapshot(function(snap){
        var list = snap.docs.map(function(d){return {id:d.id,...d.data()}});
        list.sort(function(a,b){
          if(a.done!==b.done) return a.done?1:-1;
          var pa={urgent:0,normal:1,cool:2}; 
          if((pa[a.prio]||1)!==(pa[b.prio]||1)) return (pa[a.prio]||1)-(pa[b.prio]||1);
          return (a.date||"9999").localeCompare(b.date||"9999");
        });
        setTodos(list);
      });
    return function(){unsub()};
  }, [viewUser]);

  // Charger tâches assignées par l'admin à d'autres
  useEffect(function(){
    if(!isAdmin || viewUser !== curUser.id) { setAssigned([]); return; }
    var unsub = db.collection("todos")
      .where("createdById","==",curUser.id)
      .orderBy("date","asc")
      .onSnapshot(function(snap){
        var all = snap.docs.map(function(d){return {id:d.id,...d.data()}});
        setAssigned(all.filter(function(t){return t.userId !== curUser.id}));
      });
    return function(){unsub()};
  }, [viewUser, curUser.id]);

  var pending = todos.filter(function(t){return !t.done});
  var done = todos.filter(function(t){return t.done});
  var progress = todos.length>0 ? Math.round((done.length/todos.length)*100) : 0;

  // Ajouter tâche
  var addTask = function(targetUserId) {
    if(!newTask.trim()) return;
    var emoji = emojis[Math.floor(Math.random()*emojis.length)];
    db.collection("todos").add({
      userId: targetUserId || viewUser,
      text: newTask.trim(),
      emoji: emoji,
      prio: newPrio,
      date: newDate || null,
      time: newTime || null,
      done: false,
      createdAt: new Date().toISOString(),
      createdBy: curUser.nom,
      createdById: curUser.id
    });
    if(targetUserId && targetUserId !== curUser.id) {
      var u = users.find(function(x){return x.id===targetUserId});
      botMsg("general", "📝 "+curUser.nom+" a assigné une tâche à "+(u?u.nom:"?")+' : "'+newTask.trim()+'"');
    }
    setNewTask("");
    setNewDate("");
    setNewTime("");
    setNewPrio("normal");
    setAddFor("");
  };

  // Toggle done
  var toggleDone = function(t) {
    db.collection("todos").doc(t.id).update({done:!t.done, doneAt:!t.done?new Date().toISOString():null});
    if(!t.done) {
      var cheers = ["🎉 Bravo !","💪 Bien joué !","✨ Nickel !","🏆 Champion !","🔥 En feu !","👏 Super !"];
      var cheer = cheers[Math.floor(Math.random()*cheers.length)];
      // Mini animation dans le state
    }
  };

  // Supprimer
  var delTask = function(id) {
    db.collection("todos").doc(id).delete();
  };

  // Vérif retard
  var isLate = function(t) {
    if(!t.date || t.done) return false;
    var d = new Date(t.date+(t.time?"T"+t.time:"T23:59"));
    return d < new Date();
  };

  var formatDeadline = function(t) {
    if(!t.date) return null;
    var d = new Date(t.date);
    var now = new Date();
    var diff = Math.ceil((d - now)/(1000*60*60*24));
    var str = d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"});
    if(t.time) str += " "+t.time;
    if(diff===0) return {text:"Aujourd'hui"+(t.time?" "+t.time:""),color:"#F59E0B"};
    if(diff===1) return {text:"Demain"+(t.time?" "+t.time:""),color:"#3B82F6"};
    if(diff<0) return {text:str+" ("+Math.abs(diff)+"j de retard)",color:"#EF4444"};
    return {text:str,color:"#94A3B8"};
  };

  var activeUsers = users.filter(function(u){return u.actif});

  return <div style={{animation:"fi .3s"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div>
        <h1 style={{fontSize:22,fontWeight:700}}>📝 {isAdmin&&viewUser!==curUser.id?"Tâches de "+((users.find(function(u){return u.id===viewUser})||{}).nom||""):"Mes tâches"}</h1>
        {todos.length>0 && <div style={{fontSize:11,color:"#94A3B8",marginTop:2}}>{done.length}/{todos.length} terminées — {progress}% 🎯</div>}
      </div>
    </div>

    {/* Phrase motivante */}
    <div style={{background:"linear-gradient(135deg,rgba(245,158,11,0.08),rgba(139,92,246,0.06))",border:"1px solid rgba(245,158,11,0.15)",borderRadius:10,padding:"10px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:10,animation:"fi .5s"}}>
      <span style={{fontSize:22}}>{todoPhrase[0]}</span>
      <span style={{fontSize:12,fontWeight:500,color:"#E2E8F0",fontStyle:"italic"}}>{todoPhrase[1]}</span>
    </div>

    {/* Admin: voir les tâches de chaque employé */}
    {isAdmin && <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap"}}>
      {activeUsers.map(function(u){
        var isActive = viewUser===u.id;
        var rc = ROLES.find(function(r){return r.id===u.role});
        var col = rc?rc.c:"#94A3B8";
        return <div key={u.id} onClick={function(){setViewUser(u.id)}} style={{padding:"6px 12px",borderRadius:16,cursor:"pointer",fontSize:10,fontWeight:isActive?700:400,background:isActive?col+"20":"#1E293B",color:isActive?col:"#94A3B8",border:"1px solid "+(isActive?col+"40":"#334155"),display:"flex",alignItems:"center",gap:4}}>
          {u.id===curUser.id?"🏠 ":""}{u.nom.split(" ")[0]}
        </div>;
      })}
    </div>}

    {/* Barre de progression fun */}
    {todos.length>0 && <div style={{marginBottom:16}}>
      <div style={{height:10,background:"#1E293B",borderRadius:5,overflow:"hidden",border:"1px solid #334155"}}>
        <div style={{height:"100%",width:progress+"%",background:progress===100?"linear-gradient(90deg,#10B981,#34D399)":progress>50?"linear-gradient(90deg,#F59E0B,#FBBF24)":"linear-gradient(90deg,#3B82F6,#60A5FA)",borderRadius:5,transition:"width 0.5s ease"}}></div>
      </div>
      {progress===100 && <div style={{textAlign:"center",marginTop:6,fontSize:13,fontWeight:700,color:"#10B981"}}>🎉 Toutes les tâches sont terminées ! Bravo ! 🏆</div>}
    </div>}

    {/* Ajouter une tâche */}
    <div style={{...S.c,padding:"14px",marginBottom:14,border:"1px solid rgba(245,158,11,0.2)"}}>
      <div style={{display:"flex",gap:8,alignItems:"end",flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:200}}>
          <label style={S.l}>✏️ Nouvelle tâche</label>
          <input style={{...S.i,padding:"10px 14px",fontSize:13}} value={newTask} onChange={function(e){setNewTask(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")addTask(isAdmin?addFor||viewUser:curUser.id)}} placeholder="Ex: Rappeler client Dupont, Commander pare-choc…" />
        </div>
        <div style={{width:130}}>
          <label style={S.l}>📅 Date</label>
          <input type="date" style={S.i} value={newDate} onChange={function(e){setNewDate(e.target.value)}} />
        </div>
        <div style={{width:90}}>
          <label style={S.l}>🕐 Heure</label>
          <input type="time" style={S.i} value={newTime} onChange={function(e){setNewTime(e.target.value)}} />
        </div>
        <div style={{width:120}}>
          <label style={S.l}>Priorité</label>
          <select style={S.i} value={newPrio} onChange={function(e){setNewPrio(e.target.value)}}>
            <option value="urgent">🔴 Urgent</option>
            <option value="normal">🟡 Normal</option>
            <option value="cool">🟢 Tranquille</option>
          </select>
        </div>
        {isAdmin && <div style={{width:130}}>
          <label style={S.l}>👤 Pour</label>
          <select style={S.i} value={addFor||viewUser} onChange={function(e){setAddFor(e.target.value)}}>
            {activeUsers.map(function(u){return <option key={u.id} value={u.id}>{u.id===curUser.id?"Moi":u.nom.split(" ")[0]}</option>})}
          </select>
        </div>}
        <button onClick={function(){addTask(isAdmin?addFor||viewUser:curUser.id)}} disabled={!newTask.trim()} style={{padding:"10px 18px",background:newTask.trim()?"linear-gradient(135deg,#F59E0B,#D97706)":"#334155",border:"none",borderRadius:8,color:newTask.trim()?"#0F172A":"#64748B",fontWeight:700,fontSize:12,cursor:newTask.trim()?"pointer":"default",whiteSpace:"nowrap"}}>+ Ajouter</button>
      </div>
    </div>

    {/* Tâches en cours */}
    {pending.length===0 && done.length===0 && <div style={{...S.c,padding:"40px",textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:10}}>🌟</div>
      <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>Rien à faire pour le moment !</div>
      <div style={{fontSize:11,color:"#94A3B8"}}>Ajoutez une tâche ci-dessus pour commencer</div>
    </div>}

    {pending.length>0 && <div style={{marginBottom:14}}>
      {pending.map(function(t){
        var pc = prioConfig[t.prio||"normal"];
        var late = isLate(t);
        var deadline = formatDeadline(t);
        return <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",marginBottom:6,background:late?"rgba(239,68,68,0.05)":pc.bg,borderRadius:10,border:"1px solid "+(late?"rgba(239,68,68,0.25)":pc.color+"20"),animation:"fi .3s",transition:"all 0.3s"}}>
          <div onClick={function(){toggleDone(t)}} style={{width:28,height:28,borderRadius:14,border:"2px solid "+pc.color,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.2s"}}>
          </div>
          <span style={{fontSize:18}}>{t.emoji||"📝"}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:13}}>{t.text}</div>
            <div style={{display:"flex",gap:8,alignItems:"center",marginTop:3}}>
              {deadline && <span style={{fontSize:9,color:deadline.color,fontWeight:600}}>📅 {deadline.text}</span>}
              {t.createdById!==viewUser && <span style={{fontSize:9,color:"#A78BFA"}}>assigné par {t.createdBy}</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            <span style={{fontSize:8,color:pc.color,fontWeight:700,background:pc.color+"15",padding:"2px 7px",borderRadius:10}}>{pc.label}</span>
            {(curUser.role==="admin"||curUser.id===t.userId) && <span onClick={function(){delTask(t.id)}} style={{color:"#64748B",cursor:"pointer",fontSize:10,opacity:0.5}}>✕</span>}
          </div>
        </div>;
      })}
    </div>}

    {/* Tâches terminées */}
    {done.length>0 && <div>
      <div onClick={function(){setShowDone(!showDone)}} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",marginBottom:8}}>
        <span style={{fontSize:10,color:"#10B981",fontWeight:700}}>✅ Terminées ({done.length})</span>
        <span style={{fontSize:10,color:"#64748B"}}>{showDone?"▼":"▶"}</span>
      </div>
      {showDone && done.map(function(t){
        return <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",marginBottom:4,background:"rgba(16,185,129,0.04)",borderRadius:10,border:"1px solid rgba(16,185,129,0.1)",opacity:0.7}}>
          <div onClick={function(){toggleDone(t)}} style={{width:28,height:28,borderRadius:14,background:"rgba(16,185,129,0.2)",border:"2px solid #10B981",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style={{color:"#10B981",fontSize:14,fontWeight:700}}>✓</span>
          </div>
          <span style={{fontSize:18}}>{t.emoji||"📝"}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:500,fontSize:13,textDecoration:"line-through",color:"#64748B"}}>{t.text}</div>
            {t.doneAt && <div style={{fontSize:8,color:"#10B981"}}>Fait le {new Date(t.doneAt).toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}</div>}
          </div>
          <span onClick={function(){delTask(t.id)}} style={{color:"#64748B",cursor:"pointer",fontSize:10,opacity:0.4}}>✕</span>
        </div>;
      })}
    </div>}

    {/* Tâches assignées par l'admin */}
    {isAdmin && viewUser===curUser.id && assigned.length>0 && <div style={{marginTop:20}}>
      <h3 style={{fontSize:13,fontWeight:700,marginBottom:10,color:"#A78BFA"}}>📤 Tâches que j'ai assignées ({assigned.filter(function(t){return !t.done}).length} en cours / {assigned.length} total)</h3>
      {assigned.map(function(t){
        var pc = prioConfig[t.prio||"normal"];
        var dest = users.find(function(u){return u.id===t.userId});
        var destName = dest?dest.nom:"?";
        var rc = ROLES.find(function(r){return dest&&r.id===dest.role});
        var col = rc?rc.c:"#94A3B8";
        var deadline = formatDeadline(t);
        return <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",marginBottom:5,background:t.done?"rgba(16,185,129,0.04)":"rgba(139,92,246,0.05)",borderRadius:10,border:"1px solid "+(t.done?"rgba(16,185,129,0.15)":"rgba(139,92,246,0.15)"),opacity:t.done?0.6:1}}>
          <div style={{width:26,height:26,borderRadius:8,background:col+"25",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:col,flexShrink:0}}>{destName.charAt(0)}</div>
          <span style={{fontSize:16}}>{t.emoji||"📝"}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:t.done?500:600,fontSize:12,textDecoration:t.done?"line-through":"none",color:t.done?"#64748B":"#E2E8F0"}}>{t.text}</div>
            <div style={{display:"flex",gap:8,alignItems:"center",marginTop:2}}>
              <span style={{fontSize:9,color:col,fontWeight:600}}>→ {destName}</span>
              {deadline && <span style={{fontSize:8,color:deadline.color}}>📅 {deadline.text}</span>}
              {t.done && t.doneAt && <span style={{fontSize:8,color:"#10B981"}}>✅ {new Date(t.doneAt).toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}</span>}
            </div>
          </div>
          <span style={{fontSize:8,color:pc.color,fontWeight:700,background:pc.color+"15",padding:"2px 7px",borderRadius:10}}>{t.done?"✅ Fait":pc.label}</span>
          <span onClick={function(){delTask(t.id)}} style={{color:"#64748B",cursor:"pointer",fontSize:10,opacity:0.4}}>✕</span>
        </div>;
      })}
    </div>}
  </div>;
}

/* === BOITE AUX LETTRES === */
function InboxPage({curUser, users, openFloatMail}) {
  const [mainTab, setMainTab] = useState("outlook");
  const [tab, setTab] = useState("received");
  const [received, setReceived] = useState([]);
  const [sent, setSent] = useState([]);
  const [showNew, setShowNew] = useState(false);
  const [toUser, setToUser] = useState("");
  const [msgText, setMsgText] = useState("");
  const [viewMsg, setViewMsg] = useState(null);

  // Outlook state
  const [olMails, setOlMails] = useState([]);
  const [olLoading, setOlLoading] = useState(false);
  const [olConnected, setOlConnected] = useState(false);
  const [olError, setOlError] = useState("");
  const [olViewMail, setOlViewMail] = useState(null);
  const [olAttachments, setOlAttachments] = useState([]);
  const [olSearch, setOlSearch] = useState("");
  const [olSearching, setOlSearching] = useState(false);
  const [olFolder, setOlFolder] = useState("inbox");
  const [olAccount, setOlAccount] = useState(null);
  const [olNotif, setOlNotif] = useState(null);
  const olMailCountRef = useRef(0);
  const olPollRef = useRef(null);
  const [dragOverAtt, setDragOverAtt] = useState(null);

  // Charger messages internes reçus
  useEffect(function(){
    var unsub = db.collection("inbox")
      .where("toId","==",curUser.id)
      .onSnapshot(function(snap){
        var list = snap.docs.map(function(d){return {id:d.id,...d.data()}});
        list.sort(function(a,b){return (b.date||"").localeCompare(a.date||"")});
        setReceived(list);
      });
    return function(){unsub()};
  }, [curUser.id]);

  useEffect(function(){
    var unsub = db.collection("inbox")
      .where("fromId","==",curUser.id)
      .onSnapshot(function(snap){
        var list = snap.docs.map(function(d){return {id:d.id,...d.data()}});
        list.sort(function(a,b){return (b.date||"").localeCompare(a.date||"")});
        setSent(list);
      });
    return function(){unsub()};
  }, [curUser.id]);

  // Auto-check MSAL connection
  useEffect(function(){
    var m = getMsal();
    if(m) {
      var accounts = m.getAllAccounts();
      if(accounts.length > 0) { setOlConnected(true); setOlAccount(accounts[0]); loadOutlookMails(); }
    }
    return function(){ if(olPollRef.current) clearInterval(olPollRef.current); };
  }, []);

  // Poll for new mails every 60s
  useEffect(function(){
    if(!olConnected) return;
    if(olPollRef.current) clearInterval(olPollRef.current);
    olPollRef.current = setInterval(async function(){
      try {
        var data = await outlookFetchMails("inbox", 5, 0);
        var mails = data.value || [];
        var unreadNow = mails.filter(function(m){return !m.isRead}).length;
        if(unreadNow > 0 && mails.length > 0) {
          var newest = mails[0];
          var newestTime = new Date(newest.receivedDateTime).getTime();
          var lastCheck = olMailCountRef.current;
          if(newestTime > lastCheck) {
            olMailCountRef.current = newestTime;
            var fromName = newest.from && newest.from.emailAddress ? newest.from.emailAddress.name : "Inconnu";
            setOlNotif({subject: newest.subject || "(sans objet)", from: fromName, time: Date.now()});
            // Son notification
            try { var audio = new Audio("data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1jZ2t8e3Z1dHdvZGNjZ3F/gHx5eXdxamhqb3Z8fXp5eXZwamhqb3Z8"); audio.volume=0.3; audio.play().catch(function(){}); } catch(e){}
            // Recharger la liste complète
            loadOutlookMails();
          }
        }
      } catch(e){}
    }, 60000);
    return function(){ if(olPollRef.current) clearInterval(olPollRef.current); };
  }, [olConnected]);

  // Auto-dismiss notification after 5s
  useEffect(function(){
    if(olNotif) {
      var t = setTimeout(function(){ setOlNotif(null); }, 5000);
      return function(){ clearTimeout(t); };
    }
  }, [olNotif]);

  var activeUsers = users.filter(function(u){return u.actif && u.id!==curUser.id});

  var sendMessage = function() {
    if(!toUser || !msgText.trim()) return alert("Choisissez un destinataire et écrivez un message");
    var dest = users.find(function(u){return u.id===toUser});
    if(!dest) return alert("Destinataire introuvable");
    db.collection("inbox").add({
      fromId: curUser.id, fromName: curUser.nom, fromRole: curUser.role,
      toId: dest.id, toName: dest.nom, toRole: dest.role,
      text: msgText.trim(), date: new Date().toISOString(), read: false
    });
    botMsg("general", "📬 "+curUser.nom+" a envoyé un message privé à "+dest.nom);
    setMsgText(""); setToUser(""); setShowNew(false);
  };

  var markRead = function(msg) {
    if(!msg.read) db.collection("inbox").doc(msg.id).update({read:true});
    setViewMsg(msg);
  };

  var deleteMsg = function(id) {
    if(confirm("Supprimer ce message ?")) db.collection("inbox").doc(id).delete();
    if(viewMsg && viewMsg.id===id) setViewMsg(null);
  };

  var replyTo = function(msg) {
    setToUser(msg.fromId); setMsgText(""); setShowNew(true); setViewMsg(null);
  };

  var formatDate = function(d) {
    if(!d) return "";
    var dt = new Date(d);
    return dt.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit"})+" "+dt.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  };

  var getColor = function(role) {
    var r = ROLES.find(function(x){return x.id===role});
    return r ? r.c : "#94A3B8";
  };

  // === OUTLOOK FUNCTIONS ===
  async function connectOutlook() {
    setOlLoading(true); setOlError("");
    try {
      var m = getMsal();
      if(!m) {
        setOlError("La librairie Microsoft (MSAL) n'est pas chargée. Rechargez la page et réessayez.");
        setOlLoading(false);
        return;
      }
      var acc = await outlookLogin();
      setOlConnected(true); setOlAccount(acc);
      await loadOutlookMails();
    } catch(e) { setOlError("Connexion échouée: "+e.message); }
    setOlLoading(false);
  }

  async function loadOutlookMails(folder) {
    setOlLoading(true); setOlError("");
    try {
      var data = await outlookFetchMails(folder || olFolder, 30, 0);
      var mails = data.value || [];
      setOlMails(mails);
      if(mails.length > 0) {
        olMailCountRef.current = Math.max(olMailCountRef.current, new Date(mails[0].receivedDateTime).getTime());
      }
    } catch(e) { setOlError("Erreur chargement: "+e.message); if(e.message.includes("401")) { setOlConnected(false); } }
    setOlLoading(false);
  }

  async function openOutlookMail(mail) {
    if(!mail.isRead) { try { await outlookMarkRead(mail.id); mail.isRead=true; setOlMails([...olMails]); } catch(e){} }
    var atts = [];
    if(mail.hasAttachments) {
      try { var data = await outlookGetAttachments(mail.id); atts = data.value||[]; } catch(e){} }
    if(openFloatMail) { openFloatMail(mail, atts); }
    else { setOlViewMail(mail); setOlAttachments(atts); }
  }

  async function doOlSearch() {
    if(!olSearch.trim()) { loadOutlookMails(); return; }
    setOlSearching(true); setOlError("");
    try {
      var data = await outlookSearchMails(olSearch.trim(), 30);
      setOlMails(data.value || []);
    } catch(e) { setOlError("Erreur recherche: "+e.message); }
    setOlSearching(false);
  }

  function downloadAttachment(att) {
    if(att.contentBytes) {
      var byteChars = atob(att.contentBytes);
      var byteNums = new Array(byteChars.length);
      for(var i=0;i<byteChars.length;i++) byteNums[i]=byteChars.charCodeAt(i);
      var blob = new Blob([new Uint8Array(byteNums)], {type:att.contentType||"application/octet-stream"});
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a"); a.href=url; a.download=att.name||"fichier"; a.click();
      URL.revokeObjectURL(url);
    }
  }

  // Drag start for attachment — creates a file drag
  function onAttDragStart(e, att) {
    if(att.contentBytes) {
      e.dataTransfer.setData("application/json", JSON.stringify({name:att.name,contentType:att.contentType,size:att.size,contentBytes:att.contentBytes}));
      e.dataTransfer.setData("text/plain", att.name);
      e.dataTransfer.effectAllowed = "copy";
      setDragOverAtt(att.name);
    }
  }

  function onAttDragEnd() { setDragOverAtt(null); }

  // Save attachment to Firebase Storage (for dropping into a dossier)
  async function saveAttachmentToStorage(att, dossierId) {
    if(!att.contentBytes) return null;
    var byteChars = atob(att.contentBytes);
    var byteNums = new Array(byteChars.length);
    for(var i=0;i<byteChars.length;i++) byteNums[i]=byteChars.charCodeAt(i);
    var blob = new Blob([new Uint8Array(byteNums)], {type:att.contentType||"application/octet-stream"});
    var file = new File([blob], att.name, {type:att.contentType||"application/octet-stream"});
    var path = "dossiers/"+dossierId+"/outlook_"+Date.now()+"_"+att.name;
    var result = await uploadToStorage(path, file);
    return result;
  }

  function switchOlFolder(f) {
    setOlFolder(f); setOlViewMail(null); setOlSearch(""); loadOutlookMails(f);
  }

  function disconnectOutlook() {
    var m = getMsal();
    if(m) { m.logoutPopup().catch(function(){}); }
    setOlConnected(false); setOlAccount(null); setOlMails([]); setOlViewMail(null);
    if(olPollRef.current) clearInterval(olPollRef.current);
  }

  var messages = tab==="received" ? received : sent;
  var unreadCount = received.filter(function(m){return !m.read}).length;
  var olUnread = olMails.filter(function(m){return !m.isRead}).length;

  // === RENDER ===
  return <div style={{animation:"fi .3s"}}>

    {/* === NOTIFICATION TOAST === */}
    {olNotif && <div style={{position:"fixed",top:20,right:20,zIndex:9999,background:"linear-gradient(135deg,#0078D4,#106EBE)",color:"#FFF",padding:"14px 20px",borderRadius:12,boxShadow:"0 8px 30px rgba(0,120,212,0.4)",animation:"fi .3s",maxWidth:320,cursor:"pointer"}} onClick={function(){setOlNotif(null)}}>
      <div style={{fontSize:10,fontWeight:700,marginBottom:4,opacity:0.8}}>📧 Nouveau mail Outlook</div>
      <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{olNotif.from}</div>
      <div style={{fontSize:11,opacity:0.9}}>{olNotif.subject}</div>
    </div>}

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <h1 style={{fontSize:22,fontWeight:700}}>📬 Boîte aux lettres</h1>
      {mainTab==="interne" && <button onClick={function(){setShowNew(!showNew)}} style={{...S.b,background:showNew?"rgba(239,68,68,0.1)":"linear-gradient(135deg,#F59E0B,#D97706)",color:showNew?"#FCA5A5":"#0F172A",fontWeight:700}}>{showNew?"✕ Annuler":"✏️ Nouveau message"}</button>}
    </div>

    {/* Onglets principaux : Outlook / Interne */}
    <div style={{display:"flex",gap:6,marginBottom:14}}>
      <div onClick={function(){setMainTab("outlook");setViewMsg(null)}} style={{padding:"10px 18px",borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:mainTab==="outlook"?700:400,background:mainTab==="outlook"?"linear-gradient(135deg,#0078D4,#106EBE)":"#1E293B",color:mainTab==="outlook"?"#FFF":"#94A3B8",border:"1px solid "+(mainTab==="outlook"?"#0078D4":"#334155")}}>📧 Outlook {olUnread>0?"("+olUnread+")":""}</div>
      <div onClick={function(){setMainTab("interne");setOlViewMail(null)}} style={{padding:"10px 18px",borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:mainTab==="interne"?700:400,background:mainTab==="interne"?"linear-gradient(135deg,#F59E0B,#D97706)":"#1E293B",color:mainTab==="interne"?"#0F172A":"#94A3B8",border:"1px solid "+(mainTab==="interne"?"#F59E0B":"#334155")}}>💬 Interne {unreadCount>0?"("+unreadCount+")":""}</div>
    </div>

    {/* === OUTLOOK TAB === */}
    {mainTab==="outlook" && <div style={{display:"flex",gap:12,position:"relative"}}>
      {/* Liste mails — colonne gauche */}
      <div style={{flex:olViewMail?"0 0 340px":"1",minWidth:0,transition:"flex 0.3s"}}>
        {!olConnected ? <div style={{...S.c,padding:30,textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:14}}>📧</div>
          <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>Connecter Outlook</div>
          <div style={{fontSize:11,color:"#94A3B8",marginBottom:16}}>Accédez à vos mails autocenter77@outlook.fr directement ici</div>
          <button onClick={connectOutlook} disabled={olLoading} style={{padding:"12px 28px",background:"linear-gradient(135deg,#0078D4,#106EBE)",color:"#FFF",border:"none",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer"}}>
            {olLoading ? "⏳ Connexion..." : "🔗 Se connecter à Outlook"}
          </button>
          {olError && <div style={{marginTop:10,fontSize:11,color:"#FCA5A5"}}>{olError}</div>}
        </div> : <div>
          {/* Header connecté */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:10,color:"#94A3B8"}}>✅ {olAccount?olAccount.username:"Outlook connecté"}</div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={function(){loadOutlookMails()}} style={{padding:"5px 10px",background:"rgba(0,120,212,0.15)",border:"1px solid rgba(0,120,212,0.3)",borderRadius:6,color:"#60A5FA",fontSize:10,cursor:"pointer"}}>🔄</button>
              <button onClick={disconnectOutlook} style={{padding:"5px 10px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.15)",borderRadius:6,color:"#FCA5A5",fontSize:10,cursor:"pointer"}}>✕</button>
            </div>
          </div>

          {/* Dossiers Outlook */}
          <div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}}>
            {[["inbox","📥 Réception"],["sentitems","📤 Envoyés"],["drafts","📝 Brouillons"]].map(function(f){
              return <div key={f[0]} onClick={function(){switchOlFolder(f[0])}} style={{padding:"5px 10px",borderRadius:8,cursor:"pointer",fontSize:9,fontWeight:olFolder===f[0]?700:400,background:olFolder===f[0]?"rgba(0,120,212,0.15)":"#1E293B",color:olFolder===f[0]?"#60A5FA":"#94A3B8",border:"1px solid "+(olFolder===f[0]?"rgba(0,120,212,0.3)":"#334155")}}>{f[1]}</div>;
            })}
          </div>

          {/* Recherche */}
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            <input value={olSearch} onChange={function(e){setOlSearch(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")doOlSearch()}} placeholder="Rechercher..." style={{...S.i,flex:1,fontSize:11}} />
            <button onClick={doOlSearch} style={{padding:"8px 12px",background:"linear-gradient(135deg,#0078D4,#106EBE)",color:"#FFF",border:"none",borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer"}}>{olSearching?"⏳":"🔍"}</button>
          </div>

          {olError && <div style={{marginBottom:8,fontSize:11,color:"#FCA5A5",padding:8,background:"rgba(239,68,68,0.05)",borderRadius:6}}>{olError}</div>}

          {/* Liste mails */}
          <div style={{...S.c,padding:"4px",maxHeight:olViewMail?"calc(100vh - 320px)":"none",overflow:olViewMail?"auto":"visible"}}>
            {olLoading && <div style={{textAlign:"center",padding:30,color:"#64748B",fontSize:12}}>⏳ Chargement...</div>}
            {!olLoading && olMails.length===0 && <div style={{textAlign:"center",padding:30,color:"#64748B",fontSize:12}}>Aucun mail</div>}
            {!olLoading && olMails.map(function(ml){
              var fromAddr = ml.from && ml.from.emailAddress ? ml.from.emailAddress.address : "";
              var fromName = ml.from && ml.from.emailAddress ? ml.from.emailAddress.name : fromAddr;
              var preview = ml.bodyPreview ? (ml.bodyPreview.length>70?ml.bodyPreview.slice(0,70)+"…":ml.bodyPreview) : "";
              var isActive = olViewMail && olViewMail.id === ml.id;
              return <div key={ml.id} onClick={function(){openOutlookMail(ml)}} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"10px 12px",cursor:"pointer",borderBottom:"1px solid #1E293B",background:isActive?"rgba(0,120,212,0.12)":(!ml.isRead?"rgba(0,120,212,0.04)":"transparent"),borderLeft:isActive?"3px solid #0078D4":"3px solid transparent"}} className="hr">
                {!ml.isRead && <div style={{width:8,height:8,borderRadius:4,background:"#0078D4",flexShrink:0,marginTop:6}}></div>}
                {ml.isRead && <div style={{width:8,flexShrink:0}}></div>}
                <div style={{flex:1,overflow:"hidden"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                    <span style={{fontWeight:!ml.isRead?700:500,fontSize:11,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"55%"}}>{fromName}</span>
                    <span style={{fontSize:8,color:"#64748B",flexShrink:0}}>{formatDate(ml.receivedDateTime)}</span>
                  </div>
                  <div style={{fontSize:10,fontWeight:!ml.isRead?600:400,color:!ml.isRead?"#E2E8F0":"#94A3B8",marginBottom:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ml.subject||"(sans objet)"}{ml.hasAttachments?" 📎":""}</div>
                  <div style={{fontSize:9,color:"#64748B",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{preview}</div>
                </div>
              </div>;
            })}
          </div>
        </div>}
      </div>

      {/* === PANNEAU MAIL OUVERT (persistant, à droite) === */}
      {olViewMail && <div style={{flex:1,minWidth:0,...S.c,padding:"18px",position:"sticky",top:0,maxHeight:"calc(100vh - 200px)",overflow:"auto",animation:"fi .3s",borderLeft:"2px solid #0078D4"}}>
        {/* Header mail */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{olViewMail.subject||"(sans objet)"}</div>
            <div style={{fontSize:11,color:"#94A3B8"}}>De: <span style={{color:"#60A5FA"}}>{olViewMail.from&&olViewMail.from.emailAddress?olViewMail.from.emailAddress.name:""}</span> &lt;{olViewMail.from&&olViewMail.from.emailAddress?olViewMail.from.emailAddress.address:""}&gt;</div>
            <div style={{fontSize:9,color:"#64748B",marginTop:2}}>{formatDate(olViewMail.receivedDateTime)}</div>
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            <button onClick={function(){var addr=olViewMail.from&&olViewMail.from.emailAddress?olViewMail.from.emailAddress.address:"";window.open("https://outlook.live.com/mail/0/deeplink/compose?to="+encodeURIComponent(addr)+"&subject="+encodeURIComponent("RE: "+(olViewMail.subject||"")),"_blank")}} style={{padding:"6px 12px",background:"linear-gradient(135deg,#0078D4,#106EBE)",color:"#FFF",border:"none",borderRadius:6,fontSize:10,fontWeight:600,cursor:"pointer"}}>↩ Répondre</button>
            <button onClick={function(){setOlViewMail(null)}} style={{padding:"6px 10px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.15)",borderRadius:6,color:"#FCA5A5",fontSize:12,cursor:"pointer",fontWeight:700}}>✕</button>
          </div>
        </div>

        {/* Pièces jointes — draggable */}
        {olAttachments.length>0 && <div style={{marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:600,color:"#F59E0B",marginBottom:6}}>📎 Pièces jointes ({olAttachments.length}) — <span style={{color:"#94A3B8",fontWeight:400}}>glissez pour télécharger</span></div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {olAttachments.map(function(att,i){
              var isPdf = (att.name||"").toLowerCase().endsWith(".pdf");
              var isImg = /\.(jpg|jpeg|png|gif|webp)$/i.test(att.name||"");
              return <div key={i}
                draggable={true}
                onDragStart={function(e){onAttDragStart(e,att)}}
                onDragEnd={onAttDragEnd}
                onClick={function(){downloadAttachment(att)}}
                style={{padding:"8px 14px",background:dragOverAtt===att.name?"rgba(245,158,11,0.15)":"rgba(59,130,246,0.1)",border:"1px solid "+(dragOverAtt===att.name?"rgba(245,158,11,0.4)":"rgba(59,130,246,0.2)"),borderRadius:8,fontSize:10,cursor:"grab",color:"#60A5FA",display:"flex",alignItems:"center",gap:6,transition:"all 0.2s"}}>
                <span>{isPdf?"📄":isImg?"🖼":"📎"}</span>
                <span>{att.name}</span>
                <span style={{color:"#94A3B8",fontSize:9}}>({Math.round((att.size||0)/1024)}Ko)</span>
                <span style={{fontSize:8,color:"#F59E0B",marginLeft:4}}>⬇</span>
              </div>;
            })}
          </div>
        </div>}

        {/* Corps du mail */}
        <div style={{background:"#0F172A",borderRadius:10,padding:"16px",fontSize:12,lineHeight:1.6,border:"1px solid #334155",overflow:"auto"}}>
          {olViewMail.body && olViewMail.body.contentType==="html"
            ? <div dangerouslySetInnerHTML={{__html:olViewMail.body.content}} style={{color:"#E2E8F0"}} />
            : <div style={{whiteSpace:"pre-wrap"}}>{olViewMail.body?olViewMail.body.content:(olViewMail.bodyPreview||"")}</div>
          }
        </div>
      </div>}
    </div>}

    {/* === INTERNE TAB === */}
    {mainTab==="interne" && <div>
      {/* Vue message interne ouvert — panneau persistant */}
      {viewMsg && <div style={{...S.c,padding:"18px",marginBottom:14,borderLeft:"2px solid #3B82F6",animation:"fi .3s"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:36,height:36,borderRadius:10,background:getColor(viewMsg.fromRole)+"25",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:16,color:getColor(viewMsg.fromRole)}}>{(viewMsg.fromName||"?").charAt(0)}</div>
            <div>
              <div style={{fontWeight:600,fontSize:13}}>{viewMsg.fromId===curUser.id?"Vous → "+viewMsg.toName:viewMsg.fromName}</div>
              <div style={{fontSize:9,color:"#94A3B8"}}>{formatDate(viewMsg.date)}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6}}>
            {viewMsg.fromId!==curUser.id && <button onClick={function(){replyTo(viewMsg)}} style={{...S.b,background:"linear-gradient(135deg,#3B82F6,#2563EB)",color:"#FFF"}}>↩ Répondre</button>}
            <button onClick={function(){deleteMsg(viewMsg.id)}} style={{padding:"8px 12px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.15)",borderRadius:8,color:"#FCA5A5",fontSize:11,cursor:"pointer"}}>🗑</button>
            <button onClick={function(){setViewMsg(null)}} style={{padding:"8px 10px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.15)",borderRadius:8,color:"#FCA5A5",fontSize:12,cursor:"pointer",fontWeight:700}}>✕</button>
          </div>
        </div>
        <div style={{background:"#0F172A",borderRadius:10,padding:"16px",fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap",border:"1px solid #334155"}}>{viewMsg.text}</div>
      </div>}

      {/* Nouveau message */}
      {showNew && <div style={{...S.c,padding:"18px",marginBottom:14,border:"1px solid rgba(245,158,11,0.3)",animation:"fi .2s"}}>
        <h4 style={{fontSize:12,fontWeight:600,marginBottom:10,color:"#F59E0B"}}>✏️ Nouveau message</h4>
        <div style={{marginBottom:8}}>
          <label style={S.l}>@ Destinataire</label>
          <select style={S.i} value={toUser} onChange={function(e){setToUser(e.target.value)}}>
            <option value="">Choisir un destinataire…</option>
            {activeUsers.map(function(u){
              var rc = ROLES.find(function(r){return r.id===u.role});
              return <option key={u.id} value={u.id}>@{u.nom} — {rc?rc.l:u.role}</option>;
            })}
          </select>
        </div>
        <div style={{marginBottom:10}}>
          <label style={S.l}>Message</label>
          <textarea style={{...S.i,height:100,resize:"vertical",fontFamily:"inherit",lineHeight:1.5}} value={msgText} onChange={function(e){setMsgText(e.target.value)}} placeholder="Écrivez votre message…"></textarea>
        </div>
        <div style={{textAlign:"right"}}>
          <button onClick={sendMessage} disabled={!toUser||!msgText.trim()} style={{padding:"10px 20px",background:toUser&&msgText.trim()?"linear-gradient(135deg,#F59E0B,#D97706)":"#334155",border:"none",borderRadius:8,color:toUser&&msgText.trim()?"#0F172A":"#64748B",fontWeight:700,fontSize:12,cursor:toUser&&msgText.trim()?"pointer":"default"}}>📤 Envoyer</button>
        </div>
      </div>}

      {/* Onglets reçus / envoyés */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        <div onClick={function(){setTab("received")}} style={{padding:"8px 16px",borderRadius:20,cursor:"pointer",fontSize:11,fontWeight:tab==="received"?700:400,background:tab==="received"?"rgba(59,130,246,0.15)":"#1E293B",color:tab==="received"?"#60A5FA":"#94A3B8",border:"1px solid "+(tab==="received"?"rgba(59,130,246,0.3)":"#334155")}}>📥 Reçus ({received.length}){unreadCount>0?" · "+unreadCount+" nouveau"+(unreadCount>1?"x":""):""}</div>
        <div onClick={function(){setTab("sent")}} style={{padding:"8px 16px",borderRadius:20,cursor:"pointer",fontSize:11,fontWeight:tab==="sent"?700:400,background:tab==="sent"?"rgba(139,92,246,0.15)":"#1E293B",color:tab==="sent"?"#A78BFA":"#94A3B8",border:"1px solid "+(tab==="sent"?"rgba(139,92,246,0.3)":"#334155")}}>📤 Envoyés ({sent.length})</div>
      </div>

      {/* Liste messages internes */}
      <div style={{...S.c,padding:"8px"}}>
        {messages.length===0 && <div style={{textAlign:"center",padding:30,color:"#64748B",fontSize:12}}>{tab==="received"?"Aucun message reçu":"Aucun message envoyé"}</div>}
        {messages.map(function(m){
          var isUnread = tab==="received" && !m.read;
          var person = tab==="received" ? m.fromName : m.toName;
          var personRole = tab==="received" ? m.fromRole : m.toRole;
          var preview = m.text.length>80 ? m.text.slice(0,80)+"…" : m.text;
          var isActive = viewMsg && viewMsg.id === m.id;
          return <div key={m.id} onClick={function(){markRead(m)}} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer",borderBottom:"1px solid #1E293B",background:isActive?"rgba(59,130,246,0.1)":(isUnread?"rgba(59,130,246,0.04)":"transparent"),borderLeft:isActive?"3px solid #3B82F6":"3px solid transparent"}}>
            {isUnread && <div style={{width:8,height:8,borderRadius:4,background:"#3B82F6",flexShrink:0}}></div>}
            {!isUnread && <div style={{width:8,flexShrink:0}}></div>}
            <div style={{width:32,height:32,borderRadius:8,background:getColor(personRole)+"25",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,color:getColor(personRole),flexShrink:0}}>{(person||"?").charAt(0)}</div>
            <div style={{flex:1,overflow:"hidden"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                <span style={{fontWeight:isUnread?700:500,fontSize:12}}>{tab==="received"?"De":"À"} @{person}</span>
                <span style={{fontSize:8,color:"#64748B",flexShrink:0}}>{formatDate(m.date)}</span>
              </div>
              <div style={{fontSize:11,color:isUnread?"#E2E8F0":"#94A3B8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{preview}</div>
            </div>
            <span onClick={function(e){e.stopPropagation();deleteMsg(m.id)}} style={{color:"#64748B",cursor:"pointer",fontSize:10,opacity:0.5,flexShrink:0}}>✕</span>
          </div>;
        })}
      </div>
    </div>}
  </div>;
}

/* === CHAT EQUIPE === */
function ChatPage({curUser, users}) {
  const [messages, setMessages] = useState([]);
  const [newMsg, setNewMsg] = useState("");
  const [channel, setChannel] = useState("general");
  const bottomRef = useRef(null);

  // Phrases d'encouragement et réflexions profondes
  var PHRASES_ENCOUR = [
    "💪 Allez l'équipe, on donne tout aujourd'hui !",
    "🔥 Chaque voiture réparée, c'est un client heureux. Continuez !",
    "⚡ L'énergie d'aujourd'hui construit le succès de demain.",
    "🚀 Vous êtes une équipe en or, n'oubliez jamais ça !",
    "👊 Le travail bien fait est la meilleure des cartes de visite.",
    "🏆 Petit à petit, on devient les meilleurs. Fier de cette équipe !",
    "💯 Chaque détail compte. La perfection, c'est votre marque.",
    "☕ Pause café méritée ! Rechargez les batteries et on repart.",
    "🎯 Restez concentrés, la fin de journée approche, on finit fort !",
    "🤝 Le travail d'équipe fait la force. Merci à chacun d'entre vous.",
    "🌟 Un bon mécanicien ne répare pas que des voitures, il redonne confiance.",
    "🔧 Vos mains font des miracles chaque jour, soyez-en fiers.",
    "💼 Le professionnalisme, c'est faire bien même quand personne ne regarde.",
    "🛠 Chaque problème a une solution. On trouve, on répare, on avance.",
    "🏁 La journée est un marathon, pas un sprint. Gérez votre rythme !"
  ];
  var PHRASES_REFLEX = [
    "🌊 \"La mer est calme, mais le marin reste prêt.\" — Sagesse ancienne",
    "🌱 \"Ce n'est pas la force, mais la constance qui fait les grandes œuvres.\" — Nietzsche",
    "🔑 \"Le succès, c'est tomber sept fois et se relever huit.\" — Proverbe japonais",
    "🌅 \"Chaque matin est une chance de tout recommencer.\"",
    "🧭 \"Celui qui déplace la montagne commence par les petites pierres.\" — Confucius",
    "💎 \"La patience est amère, mais son fruit est doux.\" — Aristote",
    "🌳 \"Un arbre qui pousse fait moins de bruit qu'une forêt qui tombe.\"",
    "🕊 \"Le meilleur moment pour planter un arbre, c'était il y a 20 ans. Le deuxième meilleur, c'est maintenant.\"",
    "⭐ \"On ne peut pas diriger le vent, mais on peut ajuster les voiles.\"",
    "🏔 \"Ce qui compte, ce n'est pas la hauteur de la montagne, mais la volonté de la gravir.\"",
    "🌻 \"Là où il y a de la volonté, il y a un chemin.\"",
    "🦅 \"L'aigle ne chasse pas les mouches.\" — Proverbe africain",
    "💫 \"Le talent gagne des matchs, l'équipe gagne des championnats.\" — Michael Jordan",
    "🎋 \"Le bambou qui plie ne se rompt pas.\" — Proverbe japonais",
    "🌙 \"Les étoiles ne brillent que dans l'obscurité.\""
  ];

  // Message à l'ouverture du chat (1 fois par session)
  useEffect(function(){
    try {
      var k = "psg_chatopen_"+curUser.id;
      if(sessionStorage.getItem(k)) return;
      sessionStorage.setItem(k, "1");
      var prenom = curUser.nom.split(" ")[0];
      var msgs = [
        "Salut "+prenom+" ! Content de te voir ici 😊",
        "Hey "+prenom+" ! Bienvenue dans le chat 👋",
        "Hello "+prenom+" ! L'équipe est là, on avance ensemble 💪",
        prenom+" est dans la place ! 🔥 Bonne journée à toi !"
      ];
      botMsg("general", msgs[Math.floor(Math.random()*msgs.length)]);
    }catch(e){}
  }, []);

  // Messages périodiques (toutes les 2h)
  useEffect(function(){
    var sendPeriodic = function() {
      try {
        var now = new Date();
        var h = now.getHours();
        var slot = Math.floor(h/2);
        var k = "psg_periodic_"+now.toISOString().slice(0,10)+"_"+slot;
        if(sessionStorage.getItem(k)) return;
        sessionStorage.setItem(k, "1");
        var allPhrases = PHRASES_ENCOUR.concat(PHRASES_REFLEX);
        var phrase = allPhrases[Math.floor(Math.random()*allPhrases.length)];
        botMsg("general", phrase);
      }catch(e){}
    };
    sendPeriodic();
    var iv = setInterval(sendPeriodic, 300000);
    return function(){clearInterval(iv)};
  }, []);

  const channels = [
    {id:"general",label:"💬 Général",color:"#F59E0B"},
    {id:"carrosserie",label:"🔧 Carrosserie",color:"#3B82F6"},
    {id:"mecanique",label:"⚙️ Mécanique",color:"#10B981"},
    {id:"urgent",label:"🚨 Urgent",color:"#EF4444"}
  ];

  useEffect(function(){
    var unsub = db.collection("chat").doc(channel).collection("messages")
      .orderBy("date","asc").limitToLast(100)
      .onSnapshot(function(snap){
        var msgs = snap.docs.map(function(d){return {id:d.id,...d.data()}});
        setMessages(msgs);
        setTimeout(function(){if(bottomRef.current)bottomRef.current.scrollIntoView({behavior:"smooth"})},100);
      });
    return function(){unsub()};
  },[channel]);

  var sendMsg = function() {
    var txt = newMsg.trim();
    if(!txt) return;
    db.collection("chat").doc(channel).collection("messages").add({
      text: txt,
      userId: curUser.id,
      userName: curUser.nom,
      userRole: curUser.role,
      date: new Date().toISOString()
    });
    setNewMsg("");
  };

  var deleteMsg = function(msgId) {
    db.collection("chat").doc(channel).collection("messages").doc(msgId).delete();
  };

  var formatTime = function(d) {
    if(!d) return "";
    var dt = new Date(d);
    var now = new Date();
    var isToday = dt.toDateString() === now.toDateString();
    if(isToday) return dt.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
    return dt.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"})+" "+dt.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  };

  var getColor = function(role) {
    if(role==="bot") return "#F59E0B";
    var r = ROLES.find(function(x){return x.id===role});
    return r ? r.c : "#94A3B8";
  };

  return <div style={{animation:"fi .3s",display:"flex",flexDirection:"column",height:"calc(100vh - 80px)"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <h1 style={{fontSize:22,fontWeight:700}}>💬 Chat équipe</h1>
      <div style={{fontSize:10,color:"#64748B"}}>{users.filter(function(u){return u.actif}).length} membres actifs</div>
    </div>

    {/* Canaux */}
    <div style={{display:"flex",gap:6,marginBottom:12}}>
      {channels.map(function(ch){
        var isActive = channel===ch.id;
        return <div key={ch.id} onClick={function(){setChannel(ch.id)}} style={{padding:"7px 14px",borderRadius:20,cursor:"pointer",fontSize:11,fontWeight:isActive?700:400,background:isActive?ch.color+"20":"#1E293B",color:isActive?ch.color:"#94A3B8",border:"1px solid "+(isActive?ch.color+"40":"#334155")}}>{ch.label}</div>;
      })}
    </div>

    {/* Zone messages */}
    <div style={{flex:1,overflow:"auto",...S.c,padding:"14px",marginBottom:10}}>
      {messages.length===0 && <div style={{textAlign:"center",padding:40,color:"#64748B",fontSize:12}}>Aucun message dans ce canal. Lancez la conversation !</div>}
      {messages.map(function(m,i) {
        var isMe = m.userId === curUser.id;
        var isBot = m.isBot || m.userId==="bot";
        var showName = i===0 || messages[i-1].userId !== m.userId;
        return <div key={m.id} style={{marginBottom:showName?10:3}}>
          {showName && <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
            <div style={{width:22,height:22,borderRadius:6,background:isBot?"rgba(245,158,11,0.2)":getColor(m.userRole)+"25",display:"flex",alignItems:"center",justifyContent:"center",fontSize:isBot?12:10,fontWeight:700,color:getColor(m.userRole)}}>{isBot?"🤖":(m.userName||"?").charAt(0)}</div>
            <span style={{fontSize:10,fontWeight:600,color:getColor(m.userRole)}}>{m.userName}</span>
            {isBot && <span style={{fontSize:7,background:"rgba(245,158,11,0.15)",color:"#F59E0B",padding:"1px 5px",borderRadius:3,fontWeight:700}}>BOT</span>}
            <span style={{fontSize:8,color:"#64748B"}}>{formatTime(m.date)}</span>
          </div>}
          <div style={{display:"flex",alignItems:"center",gap:6,paddingLeft:showName?27:27}}>
            <div style={{maxWidth:"75%",background:isBot?"rgba(245,158,11,0.06)":isMe?"rgba(245,158,11,0.1)":"#0F172A",border:"1px solid "+(isBot?"rgba(245,158,11,0.15)":isMe?"rgba(245,158,11,0.2)":"#334155"),borderRadius:isMe?"12px 12px 4px 12px":"12px 12px 12px 4px",padding:"8px 12px",fontSize:isBot?11:12,lineHeight:1.4,wordBreak:"break-word",fontStyle:isBot?"italic":"normal"}}>{m.text}</div>
            {!showName && <span style={{fontSize:8,color:"#475569"}}>{formatTime(m.date)}</span>}
            {(isMe||curUser.role==="admin") && !isBot && <span onClick={function(){deleteMsg(m.id)}} style={{fontSize:9,color:"#64748B",cursor:"pointer",opacity:0.5}}>✕</span>}
            {curUser.role==="admin" && isBot && <span onClick={function(){deleteMsg(m.id)}} style={{fontSize:9,color:"#64748B",cursor:"pointer",opacity:0.5}}>✕</span>}
          </div>
        </div>;
      })}
      <div ref={bottomRef}></div>
    </div>

    {/* Zone de saisie */}
    <div style={{display:"flex",gap:8}}>
      <input value={newMsg} onChange={function(e){setNewMsg(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg()}}} placeholder={"Message dans #"+channel+"…"} style={{...S.i,flex:1,padding:"12px 16px",fontSize:13,borderRadius:12}} />
      <button onClick={sendMsg} disabled={!newMsg.trim()} style={{padding:"12px 20px",background:newMsg.trim()?"linear-gradient(135deg,#F59E0B,#D97706)":"#334155",border:"none",borderRadius:12,color:newMsg.trim()?"#0F172A":"#64748B",fontWeight:700,fontSize:13,cursor:newMsg.trim()?"pointer":"default"}}>Envoyer</button>
    </div>
  </div>;
}

function ParamPage({users, setUsers, curUser}) {

  const [timeDate, setTimeDate] = useState(new Date().toISOString().slice(0,10));
  const [timeWeek, setTimeWeek] = useState(false);

  useEffect(function(){
    if(!isAdmin) return;
    if(timeWeek) {
      // Charger 7 jours
      var dates = [];
      for(var i=0;i<7;i++){
        var d = new Date(); d.setDate(d.getDate()-i);
        dates.push(d.toISOString().slice(0,10));
      }
      var unsub = db.collection("timetrack")
        .where("date","in",dates)
        .onSnapshot(function(snap){
          setTimeData(snap.docs.map(function(d){return {id:d.id,...d.data()}}));
        });
      return function(){unsub()};
    } else {
      var unsub = db.collection("timetrack")
        .where("date","==",timeDate)
        .onSnapshot(function(snap){
          setTimeData(snap.docs.map(function(d){return {id:d.id,...d.data()}}));
        });
      return function(){unsub()};
    }

  const changePwd = () => {

    if (myPwd.n1 !== myPwd.n2) { setMsg({ok:false,m:"MDP ne correspondent pas"}); return; }
    db.collection("users").doc(curUser.id).update({pwd:myPwd.n1});
    try{var s=JSON.parse(localStorage.getItem("psg_session")||"{}");s.pwd=myPwd.n1;localStorage.setItem("psg_session",JSON.stringify(s))}catch(e){}

        <div style={{background:"#0F172A",borderRadius:7,padding:"9px"}}><div style={{fontSize:9,color:"#94A3B8"}}>LOGIN</div><div style={{fontWeight:600,fontFamily:"monospace"}}>{curUser.login}</div></div>
        <div style={{background:"#0F172A",borderRadius:7,padding:"9px"}}><div style={{fontSize:9,color:"#94A3B8"}}>RÔLE</div><div style={{fontWeight:600,color:rl.c}}>{rl.l}</div></div>

        <div><label style={S.l}>Confirmer</label><input type="password" style={S.i} value={myPwd.n2} onChange={e=>setMyPwd({...myPwd,n2:e.target.value})} /></div>

              {!u.actif && <span style={{fontSize:8,color:"#EF4444",background:"rgba(239,68,68,0.1)",padding:"1px 5px",borderRadius:3}}>INACTIF</span>}

            {u.message && <div style={{fontSize:9,color:"#FCD34D",marginTop:1}}>💬 "{u.message}"</div>}

            {!isMe && <button onClick={() => deleteUser(u.id)} style={{padding:"4px 8px",background:"rgba(239,68,68,0.08)",border:"none",borderRadius:5,color:"#FCA5A5",fontSize:9,cursor:"pointer"}}>🗑</button>}

        </div>
