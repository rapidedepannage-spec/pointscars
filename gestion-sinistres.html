// Helper: upload file to Firebase Storage, return {url, storagePath}
function uploadToStorage(storagePath, file) {
  return new Promise(function(resolve, reject) {
    var ref = storage.ref(storagePath);
    var task = ref.put(file);
    task.on("state_changed", null, function(err){reject(err)}, function() {
      task.snapshot.ref.getDownloadURL().then(function(url) {
        resolve({url:url, storagePath:storagePath});
      }).catch(reject);
    });
  });
}
// Helper: upload base64 dataURL to Storage
function uploadBase64ToStorage(storagePath, dataUrl) {
  return new Promise(function(resolve, reject) {
    var ref = storage.ref(storagePath);
    ref.putString(dataUrl, "data_url").then(function(snap) {
      snap.ref.getDownloadURL().then(function(url) {
        resolve({url:url, storagePath:storagePath});
      }).catch(reject);
    }).catch(reject);
  });
}
// Helper: delete from Storage
function deleteFromStorage(storagePath) {
  if(!storagePath) return Promise.resolve();
  return storage.ref(storagePath).delete().catch(function(e){console.error("Storage delete error:",e)});
}

    }
  });
  if (!res.ok) {

    if (res.status === 429) throw new Error("429");
    throw new Error("Erreur TecDoc (code " + res.status + ")");

  var data = await res.json();

}

// Perplexity AI helper
async function askPerplexity(systemPrompt, userMessage) {
  var snap = await db.collection("settings").doc("perplexityKey").get();
  var key = snap.exists ? (snap.data().key || "") : "";
  if (!key) throw new Error("Clé API Perplexity non configurée — allez dans Paramètres");
  var res = await fetch("https://api.perplexity.ai/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key },
    body: JSON.stringify({
      model: "sonar",
      messages: [
        { role: "system", content: systemPrompt },
        { role: "user", content: userMessage }
      ]
    })
  });
  if (!res.ok) throw new Error("Erreur Perplexity: " + res.status);
  var data = await res.json();
  return data.choices[0].message.content;
}

":[{"designation":"","heures":0,"tauxHoraire":0,"total":0}],"observations":"","pointChoc":"","intensite":""}'
